<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英検5級特訓 - Stoic Master Ultimate</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #deff9a;
            --primary: #38bdf8;
            --danger: #ff4757;
            --success: #2ed573;
            --text: #f8fafc;
            --gold: #fbbf24;
        }

        * { box-sizing: border-box; font-family: 'Urbanist', 'Helvetica Neue', Arial, sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .screen {
            width: 100%;
            max-width: 600px;
            padding: 40px;
            text-align: center;
            display: none;
        }

        .screen.active { display: block; }

        /* --- HOME SCREEN --- */
        h1 { font-size: 2.5rem; margin-bottom: 5px; color: var(--accent); }
        .subtitle { opacity: 0.7; margin-bottom: 25px; font-size: 0.9rem; }
        
        .mode-selector {
            display: flex;
            background: #020617;
            padding: 6px;
            border-radius: 12px;
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .mode-tab {
            flex: 1;
            background: none;
            border: none;
            color: #64748b;
            padding: 12px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .mode-tab.active[data-mode="anki"] { background: var(--primary); color: #000; }
        .mode-tab.active[data-mode="test"] { background: var(--danger); color: #fff; }

        .section-title { text-align: left; font-size: 0.9rem; color: #94a3b8; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px;}

        .unit-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            max-height: 380px;
            overflow-y: auto;
            padding-right: 8px;
        }

        .unit-btn {
            background: var(--card);
            border: 1px solid rgba(255,255,255,0.05);
            color: var(--text);
            padding: 16px;
            border-radius: 12px;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s;
            font-size: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }
        .unit-btn::after {
            content: '→';
            opacity: 0.5;
            transition: transform 0.2s;
        }
        .unit-btn:hover { transform: translateX(4px); }
        .unit-btn.mode-anki:hover { border-color: var(--primary); background: rgba(56, 189, 248, 0.05); }
        .unit-btn.mode-test:hover { border-color: var(--danger); background: rgba(255, 71, 87, 0.05); }
        .unit-btn:hover::after { transform: translateX(3px); opacity: 1; }

        /* バッジ表示用の汎用スタイル */
        .status-badges {
            display: flex;
            gap: 6px;
            margin-right: auto;
            margin-left: 15px;
        }
        .badge-clear-indicator {
            font-size: 0.7rem;
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 8px;
        }
        .badge-clear-anki {
            color: var(--primary);
            background: rgba(56, 189, 248, 0.15);
            border: 1px solid rgba(56, 189, 248, 0.3);
        }
        .badge-clear-test {
            color: var(--success);
            background: rgba(46, 213, 115, 0.15);
            border: 1px solid rgba(46, 213, 115, 0.3);
        }

        /* テストクリア時の発光エフェクト */
        .unit-btn.cleared-test {
            border-color: var(--success) !important;
            animation: pulse-glow 2s infinite alternate;
        }

        @keyframes pulse-glow {
            0% { box-shadow: 0 0 5px rgba(46, 213, 115, 0.1); border-color: rgba(46, 213, 115, 0.4); }
            100% { box-shadow: 0 0 12px rgba(46, 213, 115, 0.4); border-color: var(--success); }
        }

        /* 復習ボタン専用スタイル */
        .review-btn {
            background: #2e1015 !important;
            border: 1px solid var(--danger) !important;
            box-shadow: 0 0 10px rgba(255, 71, 87, 0.15);
        }
        .review-btn:hover {
            background: #4c1d24 !important;
        }

        /* --- COMMON UI COMPONENTS --- */
        .mode-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; margin-bottom: 15px; }
        .badge-anki { background: rgba(56, 189, 248, 0.1); color: var(--primary); }
        .badge-test { background: rgba(255, 71, 87, 0.1); color: var(--danger); }
        .badge-review { background: rgba(255, 71, 87, 0.2); color: #fda4af; border: 1px solid var(--danger); }
        
        .progress-counter { font-size: 0.9rem; color: #94a3b8; font-weight: bold; background: #020617; padding: 4px 12px; border-radius: 10px; }

        .word-display { font-size: 3.5rem; font-weight: 700; margin-bottom: 40px; min-height: 90px; display: flex; justify-content: center; align-items: center; letter-spacing: 1px; text-transform: none; }
        
        /* --- ANKI SCREEN --- */
        .anki-meaning { font-size: 1.8rem; color: var(--accent); margin-bottom: 50px; min-height: 40px; visibility: hidden; }
        
        /* 暗記モード専用ボタングループ */
        .anki-btn-container {
            display: flex;
            gap: 12px;
            width: 100%;
        }
        .anki-action-btn {
            flex: 1; background: var(--card); border: 2px solid #334155; color: var(--text);
            padding: 18px; border-radius: 12px; font-size: 1.2rem; cursor: pointer; transition: all 0.2s; font-weight: bold;
        }
        .anki-action-btn:hover { border-color: var(--primary); background: #334155; }
        
        /* 覚えた・不安ボタン用スタイル */
        .anki-btn-success { border-color: var(--success); color: var(--success); }
        .anki-btn-success:hover { background: rgba(46, 213, 115, 0.15); border-color: var(--success); }
        .anki-btn-danger { border-color: var(--danger); color: var(--danger); }
        .anki-btn-danger:hover { background: rgba(255, 71, 87, 0.15); border-color: var(--danger); }

        /* --- TEST SCREEN --- */
        .stats { display: flex; justify-content: space-between; margin-bottom: 20px; font-weight: bold; align-items: center; }
        .combo-count { color: var(--success); font-size: 1.5rem; }

        .timer-track { width: 100%; height: 6px; background: #334155; border-radius: 3px; margin-bottom: 40px; }
        .timer-bar { width: 100%; height: 100%; background: var(--danger); border-radius: 3px; transition: width 0.1s linear; }

        .choice-grid { display: grid; gap: 12px; }
        .choice-btn {
            background: var(--card); border: 2px solid #334155; color: var(--text);
            padding: 18px; border-radius: 12px; cursor: pointer; font-size: 1.1rem; transition: all 0.2s; text-align: left; padding-left: 20px;
        }
        .choice-btn:hover { border-color: var(--danger); background: #334155; }

        /* --- OVERLAY / HEADER --- */
        .nav-header { text-align: left; margin-bottom: 20px; }
        .back-btn { background: none; border: none; color: #64748b; cursor: pointer; font-size: 1rem; padding: 0; }
        .back-btn:hover { color: var(--text); }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.98);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            visibility: hidden; opacity: 0; transition: 0.3s; z-index: 100; padding: 20px;
        }
        .overlay.show { visibility: visible; opacity: 1; }
        
        .overlay h2.gameover-title { color: var(--danger); font-size: 3rem; margin: 0 0 10px 0; }
        .overlay h2.clear-title { color: var(--success); font-size: 3.5rem; margin: 0 0 10px 0; text-shadow: 0 0 20px rgba(46,213,115,0.4); }
        
        .overlay p { font-size: 1.2rem; margin: 10px 0; text-align: center; }
        .retry-btn {
            background: var(--text); color: #000; border: none; padding: 15px 40px;
            font-size: 1.1rem; border-radius: 30px; cursor: pointer; font-weight: bold; margin-top: 20px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="home-screen" class="screen active">
        <h1>英検5級 <span>Stoic</span></h1>
        <p class="subtitle">単語特訓シリーズ</p>
        
        <div class="mode-selector">
            <button class="mode-tab active" data-mode="anki" onclick="setMode('anki')">暗記モード</button>
            <button class="mode-tab" data-mode="test" onclick="setMode('test')">テストモード</button>
        </div>

        <div class="section-title">チャレンジ単元を選択</div>
        <div class="unit-grid" id="unit-buttons"></div>
    </div>

    <div id="anki-screen" class="screen">
        <div class="nav-header">
            <button class="back-btn" onclick="backToHome()">← ホームに戻る</button>
        </div>
        <div class="stats">
            <div class="mode-badge badge-anki">暗記モード</div>
            <div id="anki-unit-name" style="opacity: 0.6; font-size: 0.9rem;">PART</div>
            <div id="anki-progress" class="progress-counter">残り 0 問</div>
        </div>
        <div id="anki-word" class="word-display">Word</div>
        <div id="anki-pronunciation" style="font-size: 1.3rem; color: #94a3b8; margin-top: -30px; margin-bottom: 35px; letter-spacing: 1px;">[発音]</div>
        <div id="anki-meaning" class="anki-meaning">意味</div>
        
        <div class="anki-btn-container" id="anki-controls">
            <button id="anki-main-btn" class="anki-action-btn" onclick="handleAnkiShowAnswer()">答えを表示 (Space)</button>
        </div>
    </div>

    <div id="challenge-screen" class="screen">
        <div class="nav-header">
            <button class="back-btn" onclick="backToHome()">← ギブアップ</button>
        </div>
        <div class="stats">
            <div id="test-mode-badge" class="mode-badge badge-test">テストモード (5秒制限・一撃死)</div>
            <div id="test-unit-name" style="opacity: 0.6; font-size: 0.9rem;">PART</div>
            <div id="test-progress" class="progress-counter">残り 0 / 0 問</div>
        </div>
        <div class="stats" style="margin-bottom: 10px;">
            <div>COMBO: <span id="combo" class="combo-count">0</span></div>
        </div>
        <div class="timer-track">
            <div id="timer-bar" class="timer-bar"></div>
        </div>
        <div id="question-word" class="word-display">Word</div>
        <div class="choice-grid">
            <button class="choice-btn" onclick="handleAnswer(0)" id="c0">-</button>
            <button class="choice-btn" onclick="handleAnswer(1)" id="c1">-</button>
            <button class="choice-btn" onclick="handleAnswer(2)" id="c2">-</button>
            <button class="choice-btn" onclick="handleAnswer(3)" id="c3">-</button>
        </div>
    </div>

    <div id="gameover-overlay" class="overlay">
        <h2 id="overlay-title" class="gameover-title">GAME OVER</h2>
        <p id="gameover-msg">ミスまたはタイムアップです</p>
        <div id="correct-info" style="margin-top: 10px; font-size: 1.4rem; color: var(--accent); font-weight: bold;"></div>
        <div id="final-combo-info" style="margin-top: 10px; color: #64748b;"></div>
        <button class="retry-btn" onclick="backToHome()">ホームに戻る</button>
    </div>

        // 配列シャッフル関数
        function shuffle(array) {
            let shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        // セッション開始
        function startSession(key) {
            isReviewMode = false;
            currentUnitKey = key;
            currentPool = shuffle(wordData[key]);
            originalPoolLength = currentPool.length;
            
            if (selectedMode === 'anki') {
                document.getElementById('anki-unit-name').innerText = key;
                showScreen('anki-screen');
                initAnkiQuestion();
            } else {
                document.getElementById('test-unit-name').innerText = key;
                document.getElementById('test-mode-badge').className = "mode-badge badge-test";
                document.getElementById('test-mode-badge').innerText = "テストモード (5秒制限・一撃死)";
                combo = 0;
                document.getElementById('combo').innerText = combo;
                showScreen('challenge-screen');
                nextTestQuestion();
            }
        }

        // 間違えた問題を復習リストに追加（重複なし）
        function addToReviewList(wordObj) {
            const exists = reviewList.some(item => item.en === wordObj.en);
            if (!exists) {
                reviewList.push(wordObj);
            }
        }

        /* ==========================================
           ▼ 暗記モード ロジック（修正・拡張部分）
        ========================================== */
        function initAnkiQuestion() {
            // プールが空＝すべての問題で「覚えた」を選択できた場合のみクリア
            if (currentPool.length === 0) {
                if (!clearedAnkiUnits.includes(currentUnitKey)) {
                    clearedAnkiUnits.push(currentUnitKey); 
                }
                showSessionClear("暗記モード完了！", "この単元の全単語をチェックしました。次はテストモードに挑戦してみましょう！");
                return;
            }

            document.getElementById('anki-progress').innerText = `残り ${currentPool.length} 問`;

            isMeaningRevealed = false;
            // 配列の先頭から問題を1つ取り出す（「不安」で末尾に回した問題が後で綺麗に回ってくるようにするため shift を使用）
            currentQuestion = currentPool.shift(); 
            
            document.getElementById('anki-word').innerText = currentQuestion.en;
            
            const meaning = document.getElementById('anki-meaning');
            meaning.innerText = currentQuestion.jp;
            meaning.style.visibility = 'hidden';
            
            // ボタンエリアを初期状態（答えを表示）に戻す
            const controls = document.getElementById('anki-controls');
            controls.innerHTML = `<button id="anki-main-btn" class="anki-action-btn" onclick="handleAnkiShowAnswer()">答えを表示 (Space)</button>`;
        }

        // 「答えを表示」を押したときの処理
        function handleAnkiShowAnswer() {
            document.getElementById('anki-meaning').style.visibility = 'visible';
            isMeaningRevealed = true;

            // ボタンエリアを「覚えた」「不安…」の2つに差し替える
            const controls = document.getElementById('anki-controls');
            controls.innerHTML = `
                <button class="anki-action-btn anki-btn-danger" onclick="handleAnkiChoice(false)">不安… (Backspace)</button>
                <button class="anki-action-btn anki-btn-success" onclick="handleAnkiChoice(true)">覚えた！ (Enter)</button>
            `;
        }

        // 「覚えた（true）」または「不安（false）」を選んだときの処理
        function handleAnkiChoice(isKnown) {
            if (!isKnown) {
                // 不安な場合は現在の問題プールの「末尾」に再度追加する
                currentPool.push(currentQuestion);
            }
            // 次の問題へ
            initAnkiQuestion();
        }

        /* ==========================================
           ▼ テストモード ロジック
        ========================================== */
        function nextTestQuestion() {
            if (timer) clearInterval(timer);
            
            if (currentPool.length === 0) {
                if (!isReviewMode) {
                    if (!clearedUnits.includes(currentUnitKey)) {
                        clearedUnits.push(currentUnitKey); 
                    }
                    showSessionClear("COMPLETE!!", `おめでとうございます！<br>「${currentUnitKey}」の全 ${originalPoolLength} 問を完全制覇しました！`);
                } else {
                    reviewList = []; 
                    showSessionClear("弱点克服成功！", "復習リストの間違えた問題をすべてクリアしました！");
                }
                return;
            }

            document.getElementById('test-progress').innerText = `残り ${currentPool.length} / ${originalPoolLength} 問`;

            currentQuestion = currentPool.pop(); 
            document.getElementById('question-word').innerText = currentQuestion.en;

            let choices = [currentQuestion.jp];
            
            // --- 紛らわしさ極限カスタム ---
            // 1. まず出題単語が本来どの単元（キー）に属しているかを特定
            const originKey = Object.keys(wordData).find(key => 
                wordData[key].some(item => item.en === currentQuestion.en)
            ) || currentUnitKey;

            // 2. その単元の全単語をベースにする
            let basePool = wordData[originKey] || [];

            // 3. 出題単語と「頭の2文字が同じ」または「文字数の差が±2以内」の紛らわしい単語を抽出
            let visualMatches = basePool.filter(item => {
                if (item.en === currentQuestion.en) return false; // 自分自身は除外
                const sharePrefix = item.en.substring(0, 2).toLowerCase() === currentQuestion.en.substring(0, 2).toLowerCase();
                const regularLength = Math.abs(item.en.length - currentQuestion.en.length) <= 2;
                return sharePrefix || regularLength;
            });

            // シャッフルしてダミー候補（紛らわしい順）のリストを作成
            visualMatches.sort(() => Math.random() - 0.5);
            let dummyPool = visualMatches.concat(basePool.sort(() => Math.random() - 0.5));

            // 4. 選択肢が4つになるまで詰め込む
            let attempts = 0;
            while (choices.length < 4 && attempts < dummyPool.length) {
                let candidate = dummyPool[attempts].jp;
                if (!choices.includes(candidate)) choices.push(candidate);
                attempts++;
            }

            // 万が一足りない場合は全データから補填
            if (choices.length < 4) {
                const allWords = Object.values(wordData).flat();
                allWords.sort(() => Math.random() - 0.5);
                for (let item of allWords) {
                    if (choices.length >= 4) break;
                    if (!choices.includes(item.jp)) choices.push(item.jp);
                }
            }
            // --- カスタムここまで ---
            
            choices.sort(() => Math.random() - 0.5);

            for (let i = 0; i < 4; i++) {
                const btn = document.getElementById(`c${i}`);
                btn.innerText = choices[i];
                btn.dataset.correct = (choices[i] === currentQuestion.jp);
            }

            const bar = document.getElementById('timer-bar');
            let start = Date.now();
            bar.style.width = '100%';

            timer = setInterval(() => {
                let passed = Date.now() - start;
                let per = 100 - (passed / TIME_LIMIT * 100);
                bar.style.width = per + '%';

                if (passed >= TIME_LIMIT) {
                    clearInterval(timer);
                    addToReviewList(currentQuestion); 
                    testGameOver("TIME UP!");
                }
            }, 50);
        }

        function handleAnswer(idx) {
            const btn = document.getElementById(`c${idx}`);
            if (btn.dataset.correct === "true") {
                combo++;
                document.getElementById('combo').innerText = combo;
                nextTestQuestion();
            } else {
                addToReviewList(currentQuestion); 
                testGameOver("WRONG!");
            }
