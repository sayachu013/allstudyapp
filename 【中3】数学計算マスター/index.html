<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Slayer: 3rd GRADE EDITION</title>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root { --primary: #3b82f6; --accent: #f59e0b; --danger: #ef4444; --success: #10b981; --dark: #1e293b; --boss: #a855f7; --gold: linear-gradient(45deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c); }
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #f8fafc; margin: 0; overflow-x: hidden; }
        .game-container { max-width: 650px; margin: 10px auto; background: var(--dark); border-radius: 20px; padding: 20px; border: 2px solid #334155; position: relative; box-shadow: 0 0 50px rgba(0,0,0,0.5); transition: all 0.3s; }
        .btn-cleared { background: var(--gold) !important; color: #4a3703 !important; border: 2px solid #fff !important; animation: shine 3s infinite linear; }
        @keyframes shine { 0% { filter: brightness(1); } 50% { filter: brightness(1.2); box-shadow: 0 0 15px rgba(252, 246, 186, 0.5); } 100% { filter: brightness(1); } }
        .clear-mode { border-color: var(--success); box-shadow: 0 0 40px rgba(16, 185, 129, 0.4); }
        .boss-mode { border-color: var(--boss); box-shadow: 0 0 60px rgba(168, 85, 247, 0.6); transform: scale(1.02); }
        .status-bar { display: flex; justify-content: space-between; font-weight: bold; font-size: 0.9rem; align-items: center; margin-bottom: 5px; }
        .hp-container { width: 100%; height: 12px; background: #334155; border-radius: 6px; overflow: hidden; margin-bottom: 10px; }
        #hp-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #10b981, #3b82f6); transition: width 0.3s; }
        .timer-container { font-size: 2.5rem; color: var(--accent); text-align: center; font-family: monospace; text-shadow: 0 0 10px rgba(245,158,11,0.3); margin-bottom: 10px; }
        .display-area { min-height: 280px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(255,255,255,0.05); border-radius: 15px; margin: 15px 0; padding: 15px; border: 1px solid #475569; position: relative; word-wrap: break-word; overflow-wrap: break-word; }
        .combo-badge { position: absolute; top: 10px; right: 10px; background: var(--accent); color: #000; padding: 5px 15px; border-radius: 20px; font-weight: bold; display: none; z-index: 10; animation: pop 0.3s ease; }
        .choice-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; }
        .btn { padding: 15px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 1.1rem; transition: 0.2s; outline: none; }
        .btn-choice { background: #334155; color: white; border: 1px solid #475569; position: relative; }
        .btn-choice.correct { background: var(--success) !important; border-color: var(--success); }
        .btn-choice.wrong { background: var(--danger) !important; border-color: var(--danger); }
        .btn-choice.reveal-correct { background: #065f46 !important; border-color: var(--success); animation: pulse-correct 1s infinite; }
        @keyframes pulse-correct { 0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); } 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }
        .btn-main { background: var(--primary); color: white; width: 100%; margin-top: 15px; }
        .btn-challenge { background: var(--boss); color: white; width: 100%; margin-top: 15px; border: 2px solid #fff; }
        .log-area { background: #000; padding: 15px; border-radius: 10px; font-family: monospace; font-size: 0.75rem; max-height: 250px; overflow-y: auto; margin-top: 15px; color: #94a3b8; border: 1px solid #334155; }
        
        .selection-panel { background: rgba(168, 85, 247, 0.1); border: 1px solid var(--boss); border-radius: 15px; padding: 15px; margin-top: 15px; text-align: left; }
        .selection-panel h3 { margin-top: 0; font-size: 1rem; color: var(--boss); text-align: center; }
        .check-item { display: flex; align-items: center; margin: 8px 0; cursor: pointer; font-size: 1rem; }
        .check-item input { margin-right: 12px; transform: scale(1.3); }

        .hidden { display: none !important; }
        .invisible { visibility: hidden !important; }
    </style>
</head>
<body onload="initApp()">

<div class="game-container" id="game-wrap">
    <div id="screen-menu">
        <h1 style="text-align:center; color: var(--primary);">数学計算マスター 中3version</h1>
        <p style="text-align:center; opacity:0.8; font-size: 0.9rem;">【クリア条件】<br>5:00 到達 または 15連続正解</p>
        <div style="display:grid; gap:12px; margin-top: 20px;">
            <button id="btn-tenkai" class="btn btn-main" onclick="startGame('tenkai_insu')">中3 展開・因数分解</button>
            <button id="btn-root" class="btn btn-main" onclick="startGame('heifoukon')">中3 平方根</button>
            <button id="btn-houteiki" class="btn btn-main" onclick="startGame('houteiki')">中3 2次方程式</button>
            <button id="btn-nijikan" class="btn btn-main" onclick="startGame('nijikansuu')">中3 2次関数</button>
            
            <button id="btn-challenge-toggle" class="btn btn-challenge" onclick="toggleBossSelection()">🔥 ボスチャレンジ設定 🔥</button>
            
            <div id="boss-selection" class="selection-panel hidden">
                <h3>挑戦する単元を選択</h3>
                <label class="check-item"><input type="checkbox" class="boss-chk" value="tenkai_insu" checked> 展開・因数分解</label>
                <label class="check-item"><input type="checkbox" class="boss-chk" value="heifoukon" checked> 平方根</label>
                <label class="check-item"><input type="checkbox" class="boss-chk" value="houteiki" checked> 2次方程式</label>
                <label class="check-item"><input type="checkbox" class="boss-chk" value="nijikansuu" checked> 2次関数</label>
                <button id="btn-challenge" class="btn btn-challenge" style="margin-top:10px;" onclick="startGame('challenge')">開始！</button>
            </div>
        </div>
    </div>

    <div id="screen-game" class="hidden">
        <div class="status-bar">
            <span id="hp-label">LIFE: 4</span>
            <button style="background:#475569; color:white; border:none; border-radius:8px; padding:5px 10px; cursor:pointer;" onclick="location.reload()">終了</button>
        </div>
        <div class="hp-container"><div id="hp-fill"></div></div>
        <div class="timer-container" id="timer">03:00</div>
        
        <div class="display-area">
            <div id="combo" class="combo-badge">0 COMBO!</div>
            <div id="boss-label" class="hidden" style="color:var(--boss); font-weight:bold; margin-bottom:10px; font-size:1.4rem;">⚠️ ULTRA BOSS WARNING ⚠️</div>
            <div id="question-text" style="font-size:1.3rem; text-align:center; line-height:1.6; width:100%;"></div>
            <div id="guide-text" style="font-size:0.9rem; color:var(--accent); margin-top:20px;">解を求めて選択肢を表示</div>
        </div>

        <button id="btn-show-choices" class="btn btn-main" onclick="showChoices()">選択肢を表示</button>
        <div id="choice-area" class="choice-grid hidden"></div>
        <button id="btn-next" class="btn btn-main hidden" onclick="nextQuestion()">次へ進む (Enter)</button>
    </div>

    <div id="screen-result" class="hidden">
        <h2 style="text-align:center;" id="result-title">RESULT</h2>
        <div style="font-size:3.5rem; text-align:center; margin:10px 0;" id="final-status">STATUS</div>
        <div id="final-score-detail" style="text-align:center; margin-bottom:10px;"></div>
        <div id="review-log" class="log-area hidden"></div>
        <button class="btn btn-main" onclick="location.reload()">戻る</button>
    </div>
</div>

<script>
    let state = { hp: 100, combo: 0, timeLeft: 180, timer: null, currentQ: null, isLocked: false, correctCount: 0, mode: '', isBoss: false, history: [], challengePool: [], selectedBossModes: [] };
    const ALL_CHALLENGE_MODES = ['tenkai_insu', 'heifoukon', 'houteiki', 'nijikansuu'];

    function initApp() {
        checkAchievements();
    }

    function checkAchievements() {
        const modes = [
            { id: 'btn-tenkai', key: 'clear_tenkai_insu' },
            { id: 'btn-root', key: 'clear_heifoukon' },
            { id: 'btn-houteiki', key: 'clear_houteiki' },
            { id: 'btn-nijikan', key: 'clear_nijikansuu' },
            { id: 'btn-challenge-toggle', key: 'clear_challenge' }
        ];

        modes.forEach(m => {
            if(sessionStorage.getItem(m.key)) {
                const btn = document.getElementById(m.id);
                if(btn) {
                    btn.classList.add('btn-cleared');
                    if(!btn.innerHTML.includes('👑')) btn.innerHTML += ' 👑';
                }
            }
        });
    }

    function toggleBossSelection() {
        const panel = document.getElementById('boss-selection');
        panel.classList.toggle('hidden');
    }

    function toFrac(val) {
        if (val === 0) return "0";
        if (Number.isInteger(val)) return val.toString();
        const den = 120, num = Math.round(val * den);
        const gcd = (a, b) => b === 0 ? Math.abs(a) : gcd(b, a % b);
        const common = gcd(num, den);
        const n = num / common, d = den / common;
        return (n < 0 ? "-" : "") + (d === 1 ? Math.abs(n) : "\\frac{" + Math.abs(n) + "}{" + d + "}");
    }

    function fmt(c, v = "") {
        if (c === 0) return "";
        if (c === 1) return v || "1";
        if (c === -1) return "-" + (v || "");
        return c + v;
    }

    function fmtS(c, v = "") {
        if (c === 0) return "";
        return (c > 0 ? "+" : "") + fmt(c, v);
    }

    function wrap(n) { return n < 0 ? "(" + n + ")" : n.toString(); }

    const generators = {
        tenkai_insu: (isBoss) => {
            const r = (min, max) => { let res=0; while(res===0) res=Math.floor(Math.random()*(max-min+1))+min; return res; };
            const rN = (min, max) => Math.floor(Math.random()*(max-min+1))+min;

            if (isBoss) {
                const bossType = rN(0, 2);
                if (bossType === 0) {
                    const k = r(2, 5), a = r(1, 6), b = r(1, 6);
                    const q = `${fmt(k, "x^2")}${fmtS(k*(a+b), "x")}${fmtS(k*a*b)}`;
                    const ans = `${k}(x+${a})(x+${b})`;
                    return { q, aStr: ans, choices: [`${k}(x-${a})(x-${b})`, `${k}(x+${a+b})^2`, `(x+${a})(x+${b})`] };
                } else if (bossType === 1) {
                    const a = r(1, 9);
                    const q = `(x+y+${a})(x+y-${a})`;
                    const ans = `(x+y)^2-${a*a}`;
                    return { q, aStr: ans, choices: [`(x+y)^2+${a*a}`, `x^2+y^2-${a*a}`, `(x+y-${a})^2`] };
                } else {
                    const a = r(1, 5), b = r(1, 5);
                    const q = `(x+y)^2${fmtS(a+b, "(x+y)")}${fmtS(a*b)}`;
                    const ans = `(x+y+${a})(x+y+${b})`;
                    return { q, aStr: ans, choices: [`(x+y-${a})(x+y-${b})`, `(x+y+${a+b})^2`, `x+y+${a*b}`] };
                }
            }

            const type = rN(0, 3);
            if (type === 0) {
                const a = r(2, 7), b = r(1, 9), c = r(1, 9);
                const q = `${fmt(a, "x")}(x${fmtS(b)}y${fmtS(c)})`;
                const ans = `${fmt(a, "x^2")}${fmtS(a*b, "xy")}${fmtS(a*c, "x")}`;
                return { q, aStr: ans, choices: [`${a}x^2${fmtS(b, "xy")}${fmtS(c, "x")}`, `${a}x^2${fmtS(a*b, "x")}${fmtS(a*c, "y")}`, `${a}x${fmtS(a*b, "y")}`] };
            } else if (type === 1) {
                const a = r(1, 9), b = r(1, 9);
                if (rN(0,1) === 0) {
                    const q = `(x+${a})(x+${b})`;
                    const ans = `x^2${fmtS(a+b, "x")}${fmtS(a*b)}`;
                    return { q, aStr: ans, choices: [`x^2+${a*b}`, `x^2${fmtS(a+b, "x")}`, `x^2${fmtS(a*b, "x")}${fmtS(a+b)}`] };
                } else {
                    const q = `(x+${a})^2`;
                    const ans = `x^2${fmtS(2*a, "x")}${fmtS(a*a)}`;
                    return { q, aStr: ans, choices: [`x^2+${a*a}`, `x^2${fmtS(a, "x")}${fmtS(a*a)}`, `(x+${a})(x-${a})`] };
                }
            } else if (type === 2) {
                const k = r(2, 9), a = r(2, 5);
                const q = `${fmt(k, "ax")}${fmtS(k*a, "ay")}`;
                const ans = `${fmt(k, "a")}(x+${fmt(a, "y")})`;
                return { q, aStr: ans, choices: [`${k}(ax+${a}ay)`, `a(x+${a}y)`, `${k}a(x-${a}y)`] };
            } else {
                const a = r(1, 9), b = r(1, 9);
                const q = `x^2${fmtS(a+b, "x")}${fmtS(a*b)}`;
                const ans = `(x+${a})(x+${b})`;
                return { q, aStr: ans, choices: [`(x-${a})(x-${b})`, `(x+${a*b})(x+1)`, `x(x+${a+b})`] };
            }
        },
        heifoukon: (isBoss) => {
            const r = (min, max) => { let res=0; while(res===0) res=Math.floor(Math.random()*(max-min+1))+min; return res; };
            const rN = (min, max) => Math.floor(Math.random()*(max-min+1))+min;
            
            if (isBoss) {
                const bossType = rN(0, 1);
                if (bossType === 0) {
                    const a = r(2, 5), b = r(2, 6);
                    const q = `(\\sqrt{${a}} + \\sqrt{${b}})^2`;
                    const ans = `${a+b} + 2\\sqrt{${a*b}}`;
                    return { q, aStr: ans, choices: [`${a+b} + \\sqrt{${a*b}}`, `${a+b}`, `${a*a+b*b}`] };
                } else {
                    const a = r(2, 5);
                    const q = `\\sqrt{${a*4}} + \\sqrt{${a*9}} - \\sqrt{${a*16}}`;
                    const ans = `\\sqrt{${a}}`;
                    return { q, aStr: ans, choices: [`2\\sqrt{${a}}`, `5\\sqrt{${a}}`, `0`] };
                }
            }

            const type = rN(0, 5);
            if (type === 0) {
                const a = r(2, 12);
                const q = `${a*a} \\text{ の平方根}`;
                const ans = `\\pm ${a}`;
                return { q, aStr: ans, choices: [`${a}`, `-${a}`, `\\pm ${a*a}`] };
            } else if (type === 1) {
                const a = r(2, 5), b = a*a + r(1, 5);
                const q = `${a} \\text{ と } \\sqrt{${b}} \\text{ の大小比較}`;
                const ans = `${a} < \\sqrt{${b}}`;
                return { q, aStr: ans, choices: [`${a} > \\sqrt{${b}}`, `${a} = \\sqrt{${b}}`] };
            } else if (type === 2) {
                const a = r(2, 6), b = r(2, 5);
                const q = `\\sqrt{${a*a*b}} \\text{ を } a\\sqrt{b} \\text{ の形にせよ}`;
                const ans = `${fmt(a, "\\sqrt{" + b + "}")}`;
                return { q, aStr: ans, choices: [`${a*a}\\sqrt{${b}}`, `${b}\\sqrt{${a}}`, `\\sqrt{${a+b}}`] };
            } else if (type === 3) {
                const a = r(2, 5), b = r(2, 5);
                const q = `\\sqrt{${a}} \\times \\sqrt{${b}}`;
                const ans = `\\sqrt{${a*b}}`;
                return { q, aStr: ans, choices: [`${a*b}`, `\\sqrt{${a+b}}`, `${a}\\sqrt{${b}}`] };
            } else if (type === 4) {
                const a = r(2, 6), b = r(2, 5), c = r(2, 5);
                const q = `${fmt(b, "\\sqrt{" + a + "}")} + ${fmt(c, "\\sqrt{" + a + "}")}`;
                const ans = `${fmt(b+c, "\\sqrt{" + a + "}")}`;
                return { q, aStr: ans, choices: [`${b+c}\\sqrt{${a*2}}`, `\\sqrt{${(b+c)*a}}`, `${b*c}\\sqrt{${a}}`] };
            } else {
                const a = r(2, 7);
                const q = `\\frac{1}{\\sqrt{${a}}} \\text{ を有理化せよ}`;
                const ans = `\\frac{\\sqrt{${a}}}{${a}}`;
                return { q, aStr: ans, choices: [`\\sqrt{${a}}`, `${a}`, `\\frac{1}{${a}}`] };
            }
        },
        houteiki: (isBoss) => {
            const r = (min, max) => { let res=0; while(res===0) res=Math.floor(Math.random()*(max-min+1))+min; return res; };
            const rN = (min, max) => Math.floor(Math.random()*(max-min+1))+min;

            if (isBoss) {
                const bossType = rN(0, 1);
                if (bossType === 0) {
                    const a = r(1, 5), k = [1, 4, 9, 16, 25][rN(0, 4)];
                    const q = `(x${fmtS(a)})^2 = ${k}`;
                    const sol1 = Math.sqrt(k) - a, sol2 = -Math.sqrt(k) - a;
                    const ans = sol1 === sol2 ? `x=${sol1}` : `x=${sol1}, ${sol2}`;
                    return { q, aStr: ans, choices: [`x=\\pm ${Math.sqrt(k)}`, `x=${sol1+a}`, `x=${sol1}`] };
                } else {
                    const a = r(2, 3), b = r(1, 5), c = r(-5, -1);
                    const q = `${fmt(a, "x^2")}${fmtS(b, "x")}${fmtS(c)} = 0`;
                    const D = b*b - 4*a*c;
                    const ans = `x=\\frac{${-b}\\pm \\sqrt{${D}}}{${2*a}}`;
                    return { q, aStr: ans, choices: [`x=\\frac{${b}\\pm \\sqrt{${D}}}{${a}}`, `x=\\frac{${-b}\\pm ${D}}{${2*a}}`, `x=${-b}\\pm \\sqrt{${D}}`] };
                }
            }

            const type = rN(0, 2);
            if (type === 0) {
                const k = [4, 9, 16, 25, 36, 49][rN(0, 5)];
                const q = `x^2 - ${k} = 0`;
                const ans = `x=\\pm ${Math.sqrt(k)}`;
                return { q, aStr: ans, choices: [`x=${Math.sqrt(k)}`, `x=-${Math.sqrt(k)}`, `x=\\pm ${k}`] };
            } else if (type === 1) {
                const a = r(1, 6), b = r(1, 6);
                const q = `x^2 ${fmtS(a+b, "x")} ${fmtS(a*b)} = 0`;
                const ans = `x=${-a}, ${-b}`;
                return { q, aStr: ans, choices: [`x=${a}, ${b}`, `x=${-a}`, `x=${a-b}`] };
            } else {
                const b = [1, 3, 5][rN(0, 2)], c = r(-5, -1);
                const q = `x^2 ${fmtS(b, "x")} ${fmtS(c)} = 0`;
                const D = b*b - 4*c;
                const ans = `x=\\frac{${-b}\\pm \\sqrt{${D}}}{2}`;
                return { q, aStr: ans, choices: [`x=\\frac{${b}\\pm \\sqrt{${D}}}{2}`, `x=${-b}\\pm \\sqrt{${D}}`, `x=\\pm \\sqrt{${D}}`] };
            }
        },
        nijikansuu: (isBoss) => {
            const r = (min, max) => { let res=0; while(res===0) res=Math.floor(Math.random()*(max-min+1))+min; return res; };
            const rN = (min, max) => Math.floor(Math.random()*(max-min+1))+min;

            const type = rN(0, 4);
            const a = isBoss ? r(1, 3) * (rN(0,1)?1:-1) : r(1, 5) * (rN(0,1)?1:-1);

            if (type === 0) {
                const x = r(1, 4), y = a * x * x;
                // 修正：1次関数と混同しないよう「yはxの2乗に比例し」という条件を追加
                const q = `y\\text{は}x\\text{の2乗に比例し、}x=${x}\\text{のとき}y=${y}\\text{である。}y\\text{を}x\\text{の式で表せ。}`;
                const ans = `y=${fmt(a, "x^2")}`;
                return { q, aStr: ans, choices: [`y=${fmt(a*2, "x^2")}`, `y=${fmt(a, "x")}`, `y=${a*x}x^2`] };
            } else if (type === 1) {
                const x = r(2, 3), y = a * x * x;
                const q = `y \\text{は} x^2 \\text{に比例し、} x=${x} \\text{のとき} y=${y} \\text{である。式を求めよ。}`;
                const ans = `y=${fmt(a, "x^2")}`;
                return { q, aStr: ans, choices: [`y=${fmt(-a, "x^2")}`, `y=${a}x`, `y=\\frac{${y}}{${x}}x^2`] };
            } else if (type === 2) {
                const xmin = r(-4, -1), xmax = r(1, 4);
                let y1 = a * xmin * xmin, y2 = a * xmax * xmax;
                let ymin, ymax;
                if (a > 0) { ymin = 0; ymax = Math.max(y1, y2); }
                else { ymax = 0; ymin = Math.min(y1, y2); }
                const q = `y=${fmt(a, "x^2")} \\text{、} ${xmin} \\le x \\le ${xmax} \\text{のときの} y \\text{の変域を求めよ。}`;
                const ans = `${ymin} \\le y \\le ${ymax}`;
                return { q, aStr: ans, choices: [`${Math.min(y1, y2)} \\le y \\le ${Math.max(y1, y2)}`, `${ymin} < y < ${ymax}`, `0 \\le y \\le ${a*xmin*xmax}`] };
            } else if (type === 3) {
                const xmax = r(2, 5);
                const ymax = a * xmax * xmax;
                const q = `y=${fmt(a, "x^2")} \\text{、} ${a>0?0:ymax} \\le y \\le ${a>0?ymax:0} \\text{のときの} x \\text{の変域を求めよ。}`;
                const ans = `-${xmax} \\le x \\le ${xmax}`;
                return { q, aStr: ans, choices: [`0 \\le x \\le ${xmax}`, `-${xmax} < x < ${xmax}`, `${-xmax*xmax} \\le x \\le ${xmax*xmax}`] };
            } else {
                const x1 = r(-3, 2), x2 = x1 + r(1, 3);
                const q = `y=${fmt(a, "x^2")} \\text{で} x \\text{が} ${x1} \\text{から} ${x2} \\text{まで増加するときの変化の割合を求めよ。}`;
                const ans = a * (x1 + x2);
                return { q, val: ans, choices: [ans + 1, ans * 2, a] };
            }
        }
    };

    function startGame(mode) {
        let selectedModes = [];
        if (mode === 'challenge') {
            const checks = document.querySelectorAll('.boss-chk:checked');
            checks.forEach(c => selectedModes.push(c.value));
            if (selectedModes.length === 0) {
                alert("少なくとも1つの単元を選択してください。");
                return;
            }
        }

        state = { hp: 100, combo: 0, timeLeft: 180, timer: null, currentQ: null, isLocked: false, correctCount: 0, mode: mode, history: [], challengePool: selectedModes, selectedBossModes: selectedModes };
        
        document.getElementById('screen-menu').classList.add('hidden');
        document.getElementById('screen-game').classList.remove('hidden');
        state.timer = setInterval(tick, 1000);
        nextQuestion();
    }

    function tick() {
        state.timeLeft--;
        const m = Math.floor(state.timeLeft / 60), s = Math.floor(state.timeLeft % 60);
        document.getElementById('timer').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        if (state.timeLeft <= 0) endGame("TIME UP", false);
        if (state.timeLeft >= 300) endGame("TIME GOAL!", true);
    }

    function nextQuestion() {
        state.isLocked = false;
        const qText = document.getElementById('question-text');
        qText.classList.remove('invisible');
        document.getElementById('guide-text').classList.remove('invisible');

        if (state.mode === 'challenge') {
            state.isBoss = true;
            const randomMode = state.challengePool[Math.floor(Math.random() * state.challengePool.length)];
            state.currentQ = generators[randomMode](true);
        } else {
            state.isBoss = (state.correctCount > 0 && (state.correctCount + 1) % 5 === 0);
            state.currentQ = generators[state.mode](state.isBoss);
        }

        document.getElementById('boss-label').classList.toggle('hidden', !state.isBoss);
        document.getElementById('game-wrap').classList.toggle('boss-mode', state.isBoss);
        document.getElementById('btn-show-choices').classList.remove('hidden');
        document.getElementById('choice-area').classList.add('hidden');
        document.getElementById('btn-next').classList.add('hidden');
        
        qText.innerHTML = `\\(${state.currentQ.q}\\)`;
        if (state.currentQ.q.length > 40) qText.style.fontSize = "1.1rem";
        else qText.style.fontSize = "1.3rem";

        MathJax.typesetPromise();
    }

    function showChoices() {
        document.getElementById('btn-show-choices').classList.add('hidden');
        document.getElementById('question-text').classList.add('invisible');
        document.getElementById('guide-text').classList.add('invisible');

        const area = document.getElementById('choice-area');
        area.innerHTML = ''; area.classList.remove('hidden');
        
        const getDisplay = (v) => (typeof v === 'string') ? v : toFrac(v);

        let uniqueList = [];
        let seenDisplay = new Set();
        const correctVal = (typeof state.currentQ.val === 'number') ? state.currentQ.val : (state.currentQ.aStr || "0");
        const correctDisplay = getDisplay(correctVal);
        uniqueList.push({ val: correctVal, display: correctDisplay, isCorrect: true });
        seenDisplay.add(correctDisplay);

        for (let c of (state.currentQ.choices || [])) {
            const d = getDisplay(c);
            if (!seenDisplay.has(d) && uniqueList.length < 4) {
                uniqueList.push({ val: c, display: d, isCorrect: false });
                seenDisplay.add(d);
            }
        }
        
        while (uniqueList.length < 4) {
            const dummy = "x="+Math.floor(Math.random()*10);
            if (!seenDisplay.has(dummy)) {
                uniqueList.push({ val: dummy, display: dummy, isCorrect: false });
                seenDisplay.add(dummy);
            }
        }

        uniqueList.sort(() => Math.random() - 0.5).forEach(item => {
            const btn = document.createElement('button');
            btn.className = 'btn btn-choice';
            btn.innerHTML = `\\(${item.display}\\)`;
            if(item.isCorrect) btn.id = "correct-choice-btn";
            btn.onclick = () => checkAnswer(btn, item.val, item.isCorrect);
            area.appendChild(btn);
        });
        MathJax.typesetPromise([area]);
    }

    function checkAnswer(btn, selected, isCorrect) {
        if (state.isLocked) return;
        state.isLocked = true;
        document.getElementById('question-text').classList.remove('invisible');

        const getDisplay = (v) => (typeof v === 'string') ? v : toFrac(v);
        const uAns = getDisplay(selected), cAns = getDisplay(typeof state.currentQ.val === 'number' ? state.currentQ.val : state.currentQ.aStr);
        state.history.push({ q: state.currentQ.q, correct: isCorrect, userAns: uAns, correctAns: cAns });
        
        if (isCorrect) {
            btn.classList.add('correct'); 
            state.combo++; 
            state.correctCount++; 
            const bonus = (state.mode === 'challenge') ? 30 : 15;
            state.timeLeft += bonus;
            document.getElementById('combo').innerText = `${state.combo} COMBO!`;
            document.getElementById('combo').style.display = state.combo > 1 ? 'block' : 'none';
            if (state.combo >= 15) { setTimeout(() => endGame("COMBO GOAL!", true), 600); return; }
        } else {
            btn.classList.add('wrong');
            if(document.getElementById('correct-choice-btn')) document.getElementById('correct-choice-btn').classList.add('reveal-correct');
            state.combo = 0; state.hp -= 25; state.timeLeft = Math.max(0, state.timeLeft - 15);
            document.getElementById('hp-fill').style.width = `${state.hp}%`;
            document.getElementById('hp-label').innerText = `LIFE: ${Math.max(0, Math.ceil(state.hp/25))}`;
        }
        if (state.hp <= 0) setTimeout(() => endGame("GAME OVER", false), 600);
        else document.getElementById('btn-next').classList.remove('hidden');
    }

    function endGame(title, isClear) {
        clearInterval(state.timer);
        const finalStatus = document.getElementById('final-status');
        
        if(isClear) {
            if (state.mode === 'challenge') {
                const isAllSelected = ALL_CHALLENGE_MODES.every(m => state.selectedBossModes.includes(m));
                if (isAllSelected) {
                    sessionStorage.setItem('clear_challenge', 'true');
                }
            } else {
                sessionStorage.setItem('clear_' + state.mode, 'true');
            }
            finalStatus.innerText = "CLEAR!";
            finalStatus.style.color = "var(--success)";
        } else {
            finalStatus.innerText = "GAME OVER";
            finalStatus.style.color = "var(--danger)";
        }

        document.getElementById('screen-game').classList.add('hidden');
        document.getElementById('screen-result').classList.remove('hidden');
        document.getElementById('result-title').innerText = title;
        
        const logArea = document.getElementById('review-log');
        logArea.classList.remove('hidden');
        logArea.innerHTML = '<h3 style="margin-top:0; color:var(--accent);">復習ログ</h3>';
        state.history.forEach((item, index) => {
            const logItem = document.createElement('div');
            logItem.className = 'log-item';
            logItem.style.color = item.correct ? 'var(--success)' : 'var(--danger)';
            logItem.innerHTML = `${item.correct ? '◯' : '×'} 問${index+1}: \\(${item.q}\\)<br>${item.correct ? '正解: ' : '不正解! あなた: '}\\(${item.userAns}\\) → 正解: \\(${item.correctAns}\\)`;
            logArea.prepend(logItem);
        });
        MathJax.typesetPromise([logArea]);
        checkAchievements();
    }

    window.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            const nextBtn = document.getElementById('btn-next');
            if (!nextBtn.classList.contains('hidden')) nextQuestion();
            else if (!document.getElementById('btn-show-choices').classList.contains('hidden') && !document.getElementById('screen-game').classList.contains('hidden')) showChoices();
        }
    });
</script>
</body>
</html>
