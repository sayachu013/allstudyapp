<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>定期テスト TODO進捗管理</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f4f6f9; }
    .card { border: none; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
    .card-header { font-weight: bold; font-size: 1.1rem; border-radius: 12px 12px 0 0 !important; color: white; }
    .bg-英語 { background-color: #4a90e2; }
    .bg-数学 { background-color: #e25c5c; }
    .bg-国語 { background-color: #2ca02c; }
    .bg-理科 { background-color: #ff9f43; }
    .bg-社会 { background-color: #9b59b6; }
    .bg-その他 { background-color: #7f8c8d; }
    .bg-alert { background: linear-gradient(135deg, #d63031, #e17055); color: white; }
    .todo-row { padding: 10px 15px; border-bottom: 1px solid #edf2f7; transition: background 0.2s; }
    .todo-row:hover { background-color: #f8fafc; }
    .todo-checked { background-color: #e2f0d9 !important; text-decoration: line-through; color: #7f8c8d; }
    .deadline-badge { font-size: 0.8rem; background-color: #ffeaa7; color: #d63031; font-weight: bold; }
    .memo-input { border: 1px solid #ced4da; border-radius: 6px; font-size: 0.9rem; padding: 2px 8px; width: 100%; }
    .loading { display: none; text-align: center; padding: 20px; }
    .sync-badge { font-size: 0.8rem; position: fixed; bottom: 20px; right: 20px; display: none; z-index: 1000; }
    .alert-row { padding: 8px 15px; border-bottom: 1px solid #fab1a0; font-size: 0.95rem; }
    .alert-row:last-child { border-bottom: none; }
  </style>
</head>
<body>

  <div class="container py-4" style="max-width: 700px;">
    <h3 class="text-center mb-4 font-weight-bold text-secondary">📝 定期テスト TODOシステム</h3>
    
    <div class="card p-3 mb-4">
      <label for="studentSelect" class="form-label fw-bold text-muted">誰の進捗を確認・変更しますか？</label>
      <select id="studentSelect" class="form-select form-select-lg" onchange="loadStudentTodo()">
        <option value="">生徒を選択してください...</option>
      </select>
    </div>

    <div id="pickupArea" style="display: none;">
      <div class="card">
        <div class="card-header bg-alert">
          ⚠️ 期限が近いTODO（未完了のみ・期限が早い順）
        </div>
        <div class="card-body p-0" id="pickupContainer">
          </div>
      </div>
    </div>

    <div id="loadingSpinner" class="loading">
      <div class="spinner-border text-primary" role="status"></div>
      <p class="mt-2 text-muted">最新のデータを読み込み中...</p>
    </div>

    <div id="todoContainer"></div>
  </div>

  <div id="syncBadge" class="badge bg-success sync-badge p-2">保存しました</div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyRFd38nkWfmLzE-wqFzCRDppkLcpOjzB072_5806oMqB6cFfrxBevPNMVwtizd26hH/exec";
    
    let allStudentsData = [];

    window.onload = function() {
      fetch(`${GAS_URL}?action=getStudents`)
        .then(res => res.json())
        .then(students => {
          const select = document.getElementById('studentSelect');
          students.forEach(name => {
            let opt = document.createElement('option');
            opt.value = name;
            opt.textContent = name;
            select.appendChild(opt);
          });
          
          return Promise.all(students.map(name => 
            fetch(`${GAS_URL}?action=getTodoData&name=${encodeURIComponent(name)}`).then(res => res.json())
          ));
        })
        .then(results => {
          const select = document.getElementById('studentSelect');
          const studentNames = Array.from(select.options).map(o => o.value).filter(v => v !== "");
          
          allStudentsData = [];
          results.forEach((todos, index) => {
            todos.forEach(t => {
              t.studentName = studentNames[index];
              allStudentsData.push(t);
            });
          });

          checkUrgentTodos();
        })
        .catch(err => console.error("初期データの読み込みに失敗しました:", err));
    };

    function checkUrgentTodos() {
      const container = document.getElementById('pickupContainer');
      const area = document.getElementById('pickupArea');
      container.innerHTML = '';

      const now = new Date();
      const currentYear = now.getFullYear();
      
      const limitDate = new Date();
      limitDate.setDate(now.getDate() + 3);
      limitDate.setHours(23, 59, 59, 999);

      // アラート対象のTODOを一時的に格納する配列
      let urgentList = [];

      allStudentsData.forEach(todo => {
        if (todo.status !== '完了' && todo.deadline && todo.deadline !== '-') {
          const parts = todo.deadline.split('/');
          if (parts.length === 2) {
            const todoDate = new Date(currentYear, parseInt(parts[0], 10) - 1, parseInt(parts[1], 10));
            todoDate.setHours(0,0,0,0);

            if (todoDate <= limitDate) {
              // 並び替えのために、Dateオブジェクトを持たせて配列に追加
              urgentList.push({
                data: todo,
                dateObj: todoDate
              });
            }
          }
        }
      });

      // ★修正ポイント：期限が古い順（＝今日に近い、またはすでに過ぎている順）にソート
      urgentList.sort((a, b) => a.dateObj - b.dateObj);

      if (urgentList.length > 0) {
        urgentList.forEach(item => {
          const todo = item.data;
          let row = document.createElement('div');
          row.className = 'alert-row d-flex justify-content-between align-items-center row mx-0';
          row.innerHTML = `
            <div class="col-3 fw-bold text-dark">👤 ${todo.studentName}</div>
            <div class="col-2"><span class="badge bg-${['英語','数学','国語','理科','社会'].includes(todo.subject) ? todo.subject : 'その他'}">${todo.subject}</span></div>
            <div class="col-5 text-secondary text-truncate">${todo.content}</div>
            <div class="col-2 text-end text-danger fw-bold" style="font-size:0.9rem;">${todo.deadline}</div>
          `;
          container.appendChild(row);
        });
        area.style.display = 'block';
      } else {
        container.innerHTML = '<div class="p-3 text-center text-muted">現在、期限が近いTODOはありません。素晴らしい！</div>';
        area.style.display = 'block';
      }
    }

    function loadStudentTodo() {
      const name = document.getElementById('studentSelect').value;
      const container = document.getElementById('todoContainer');
      const spinner = document.getElementById('loadingSpinner');
      
      container.innerHTML = '';
      if (!name) return;

      spinner.style.display = 'block';
      
      fetch(`${GAS_URL}?action=getTodoData&name=${encodeURIComponent(name)}`)
        .then(res => res.json())
        .then(todos => {
          spinner.style.display = 'none';
          renderTodos(todos);
        })
        .catch(err => {
          spinner.style.display = 'none';
          alert("データの読み込みに失敗しました。");
        });
    }

    function renderTodos(todos) {
      const container = document.getElementById('todoContainer');
      const subjects = {};
      
      todos.forEach(todo => {
        if (!subjects[todo.subject]) subjects[todo.subject] = [];
        subjects[todo.subject].push(todo);
      });

      for (let subject in subjects) {
        let bgClass = 'bg-' + (['英語','数学','国語','理科','社会'].includes(subject) ? subject : 'その他');
        let card = document.createElement('div');
        card.className = 'card';
        
        let header = document.createElement('div');
        header.className = `card-header ${bgClass}`;
        header.textContent = subject;
        card.appendChild(header);
        
        let body = document.createElement('div');
        body.className = 'p-0';
        
        subjects[subject].forEach(todo => {
          let row = document.createElement('div');
          row.id = `row-${todo.rowNum}`;
          
          let isDone = (todo.status === '完了');
          row.className = `todo-row d-flex align-items-center row mx-0 ${isDone ? 'todo-checked' : ''}`;
          let isChecked = isDone ? 'checked' : '';
          
          row.innerHTML = `
            <div class="col-1 text-center">
              <input type="checkbox" class="form-check-input" ${isChecked} style="transform: scale(1.3);" onchange="syncData(${todo.rowNum})">
            </div>
            <div class="col-7">
              <span class="todo-text">${todo.content}</span>
              ${todo.deadline && todo.deadline !== '-' ? `<span class="badge deadline-badge ms-2">${todo.deadline}まで</span>` : ''}
            </div>
            <div class="col-4">
              <input type="text" class="memo-input" value="${todo.memo || ''}" placeholder="メモ・進捗" onchange="syncData(${todo.rowNum})">
            </div>
          `;
          body.appendChild(row);
        });
        card.appendChild(body);
        container.appendChild(card);
      }
    }

    function syncData(rowNum) {
      const row = document.getElementById(`row-${rowNum}`);
      const isChecked = row.querySelector('input[type="checkbox"]').checked;
      const memo = row.querySelector('.memo-input').value;
      const badge = document.getElementById('syncBadge');

      if (isChecked) {
        row.classList.add('todo-checked');
      } else {
        row.classList.remove('todo-checked');
      }

      badge.textContent = "保存中...";
      badge.className = "badge bg-warning sync-badge p-2";
      badge.style.display = "block";

      const updateUrl = `${GAS_URL}?action=updateProgress&rowNum=${rowNum}&isChecked=${isChecked}&memo=${encodeURIComponent(memo)}`;

      fetch(updateUrl)
      .then(res => res.json())
      .then(res => {
        if(res.status === 'success') {
          badge.textContent = "スプレッドシートに保存しました";
          badge.className = "badge bg-success sync-badge p-2";
          setTimeout(() => { badge.style.display = "none"; }, 1500);
          
          const targetTodo = allStudentsData.find(t => t.rowNum === rowNum);
          if (targetTodo) {
            targetTodo.status = isChecked ? '完了' : '□';
            targetTodo.memo = memo;
            checkUrgentTodos();
          }
        }
      })
      .catch(err => {
        badge.textContent = "保存に失敗しました";
        badge.className = "badge bg-danger sync-badge p-2";
      });
    }
  </script>
</body>
</html>
