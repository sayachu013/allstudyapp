<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>国語力RPG - コトバノタワー</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --panel-color: #161b22;
            --border-color: #30363d;
            --text-color: #c9d1d9;
            --primary-color: #1f6feb;
            --danger-color: #da3633;
            --success-color: #238636;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            user-select: none;
            transition: background-color 0.1s;
        }

        /* プレイヤー被弾時の画面全体の赤フラッシュ用 */
        body.player-damaged-flash {
            background-color: #4c1111 !important;
        }

        .screen {
            width: 450px;
            background: var(--panel-color);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            border: 2px solid var(--border-color);
            text-align: center;
            display: none;
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
        }

        .active { display: block; }

        h1 { color: #fff; margin-bottom: 5px; font-size: 2rem; text-shadow: 0 0 10px rgba(31,111,235,0.5); }
        h2 { color: #fff; margin-top: 0; }

        /* RPG風のホーム画面レイアウト */
        .tower-map {
            background: #0d1117;
            border: 2px dashed #d29922;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: inset 0 0 15px rgba(210,153,34,0.1);
        }
        .difficulty-btn {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 15px 20px;
            margin: 14px 0;
            background: linear-gradient(135deg, #1f2937, #111827);
            border: 2px solid #374151;
            border-radius: 8px;
            color: #fff;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            box-shadow: 0 4px 0 #030712;
        }
        .difficulty-btn:not(:disabled):hover {
            background: linear-gradient(135deg, #374151, #1f2937);
            border-color: #d29922;
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #030712, 0 0 10px rgba(210,153,34,0.3);
        }
        .difficulty-btn:not(:disabled):active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #030712;
        }
        .difficulty-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            background: #111827;
            border-color: #1f2937;
            box-shadow: none;
        }
        .btn-meta { text-align: left; }
        .floor-num { font-size: 0.8rem; color: #d29922; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }

        .badge {
            font-size: 0.8rem;
            padding: 6px 10px;
            border-radius: 6px;
            font-weight: bold;
        }
        .badge.locked { background: #30363d; color: #8b949e; }
        .badge.unlocked { background: var(--success-color); color: #fff; }

        /* 鍛錬の書（復習）スタイル */
        .training-panel {
            background: #0d1117;
            border: 2px solid #388bfd;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 25px;
            box-shadow: inset 0 0 15px rgba(31,111,235,0.1);
        }
        .training-btn {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 14px 20px;
            background: linear-gradient(135deg, #0f2b5c, #0d1117);
            border: 2px solid #1f6feb;
            border-radius: 8px;
            color: #fff;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 0 #051330;
        }
        .training-btn:not(:disabled):hover {
            background: linear-gradient(135deg, #1f6feb, #0f2b5c);
            border-color: #58a6ff;
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #051330, 0 0 10px rgba(56,139,253,0.4);
        }
        .training-btn:not(:disabled):active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #051330;
        }
        .training-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            background: #161b22;
            border: 2px dashed #30363d;
            box-shadow: none;
        }
        .training-badge {
            font-size: 0.8rem;
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: bold;
            background: #388bfd;
            color: #fff;
        }
        .training-badge.empty {
            background: #21262d;
            color: #8b949e;
        }

        /* バトル画面用スタイル */
        .status-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            background: #0d1117;
            padding: 10px 15px;
            border-radius: 10px;
            font-size: 0.95rem;
        }
        .hearts { color: var(--danger-color); font-size: 1.2rem; }
        .timer-box { color: #e3b341; font-weight: bold; }

        #enemy-panel {
            background: #0d1117;
            padding: 20px;
            border-radius: 15px;
            border: 2px solid var(--border-color);
            margin-bottom: 20px;
            position: relative;
        }
        #enemy-name { font-size: 1.1rem; font-weight: bold; color: #ff7b72; margin-bottom: 10px; }
        #enemy-face { font-size: 3.5rem; margin: 15px 0; min-height: 80px; display: flex; justify-content: center; align-items: center; white-space: pre; position: relative; }
        
        /* 敵ヒット時のポップアップテキスト用 */
        .damage-pop {
            position: absolute;
            color: #ff3e3e;
            font-size: 2.2rem;
            font-weight: 900;
            font-family: 'Impact', sans-serif;
            text-shadow: 2px 2px 0 #fff, -2px -2px 0 #fff, 2px -2px 0 #fff, -2px 2px 0 #fff;
            animation: pop-up-anim 0.6s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards;
            pointer-events: none;
            z-index: 10;
        }

        .bar-container {
            background: #21262d;
            height: 16px;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            margin-top: 10px;
        }
        .bar-fill { height: 100%; width: 100%; transition: width 0.2s ease, background-color 0.3s; }
        #enemy-hp-fill { background-color: var(--danger-color); }
        #timer-fill { background-color: #e3b341; width: 100%; transition: width 1s linear; }
        
        .bar-text {
            position: absolute;
            width: 100%;
            top: 0; left: 0;
            font-size: 0.75rem;
            line-height: 16px;
            font-weight: bold;
            color: #fff;
            text-shadow: 1px 1px 2px #000;
        }

        /* クイズエリア */
        #question-box {
            background: #0d1117;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid var(--border-color);
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.15rem;
            line-height: 1.6;
            margin-bottom: 15px;
        }
        .choice-btn {
            display: block;
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            background: var(--primary-color);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 1.05rem;
            cursor: pointer;
            transition: all 0.1s;
        }
        .choice-btn:hover:not(:disabled) { background: #388bfd; }
        .choice-btn:disabled { color: #fff; cursor: default; }

        /* ナビゲーションエリア（復習用） */
        #nav-box {
            margin-top: 15px;
            min-height: 50px;
        }
        .next-btn {
            width: 100%;
            padding: 12px;
            background: #d29922;
            color: #000;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            animation: pulse 1s infinite;
        }

        /* リザルト画面 */
        .result-title { font-size: 2.5rem; font-weight: bold; margin-bottom: 20px; }
        .win-title { color: #56d364; text-shadow: 0 0 20px rgba(86,211,100,0.4); animation: pulse 1.5s infinite; }
        .lose-title { color: var(--danger-color); text-shadow: 0 0 20px rgba(218,54,51,0.4); }
        
        .result-art { font-size: 4rem; margin: 30px 0; }
        .stats-card { background: #0d1117; padding: 20px; border-radius: 15px; margin-bottom: 30px; text-align: left; border: 1px solid var(--border-color); }
        .stats-row { display: flex; justify-content: space-between; margin: 10px 0; font-size: 1.1rem; }
        
        .action-btn {
            padding: 15px 30px;
            font-size: 1.2rem;
            background: var(--success-color);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }
        .action-btn:hover { background: #2ea043; }

        /* アニメーション用 */
        .enemy-shake { animation: enemy-shake-anim 0.3s linear; }
        @keyframes enemy-shake-anim {
            0%, 100% { transform: translateX(0); }
            15%, 45%, 75% { transform: translateX(-15px) scaleY(0.9); }
            30%, 60%, 90% { transform: translateX(15px) scaleY(0.9); }
        }

        @keyframes pop-up-anim {
            0% { transform: translateY(10px) scale(0.3); opacity: 0; }
            50% { transform: translateY(-20px) scale(1.3); opacity: 1; }
            100% { transform: translateY(-40px) scale(1); opacity: 0; }
        }

        .player-shake { animation: player-shake-anim 0.4s ease-in-out; }
        @keyframes player-shake-anim {
            0%, 100% { transform: translateY(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateY(-8px); }
            20%, 40%, 60%, 80% { transform: translateY(8px); }
        }

        .flash { animation: flash-anim 0.2s ease-out; }
        @keyframes flash-anim {
            0% { background-color: rgba(218,54,51,0.4); }
            100% { background-color: #0d1117; }
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }
    </style>
</head>
<body>

    <div id="home-screen" class="screen active">
        <h1 style="letter-spacing: 4px; margin-bottom: 10px;">コトバノタワー</h1>
        <div style="font-size: 0.85rem; color: #8b949e; margin-bottom: 25px; border-bottom: 1px solid #30363d; padding-bottom: 15px;">
            〜 知識 of 試練 と 魔導 of 階層 〜
        </div>
        
        <div class="training-panel">
            <div style="font-size: 0.9rem; color: #58a6ff; margin-bottom: 10px; font-weight: bold; text-align: left;">📘 自己研鑽メニュー</div>
            <button id="training-start-btn" class="training-btn">
                <div class="btn-meta">
                    <strong style="font-size: 1.1rem;">鍛錬の書を開く</strong>
                    <div style="font-size: 0.8rem; color: #8b949e; margin-top: 4px;">過去に敗北・誤答した未克服の試練に挑む</div>
                </div>
                <span id="wrong-count-badge" class="training-badge">0問</span>
            </button>
        </div>

        <div class="tower-map">
            <div style="font-size: 0.9rem; color: #d29922; margin-bottom: 10px; font-weight: bold; text-align: left;">⚔️ 討伐クエスト選択</div>
            <div id="difficulty-list">
                </div>
        </div>
    </div>

    <div id="battle-screen" class="screen">
        <div class="status-header">
            <div class="hearts">LIFE: <span id="player-life">❤️❤️❤️</span></div>
            <div class="timer-box">TIME: <span id="timer-text">12</span>s</div>
        </div>

        <div class="bar-container" style="height: 6px; margin-bottom: 15px;">
            <div id="timer-fill" class="bar-fill"></div>
        </div>

        <div id="enemy-panel">
            <div id="enemy-name">モンスター</div>
            <div id="enemy-face">
                <span id="face-span">(＾◡＾)</span>
            </div>
            <div class="bar-container">
                <div id="enemy-hp-fill" class="bar-fill"></div>
                <div id="enemy-hp-text" class="bar-text">100 / 100</div>
            </div>
        </div>

        <div id="question-box">問題文がここに表示されます。</div>
        <div id="choices-box"></div>
        <div id="nav-box"></div>
    </div>

    <div id="result-screen" class="screen">
        <div id="result-status" class="result-title">STAGE CLEAR</div>
        <div id="result-art" class="result-art">✨👑✨</div>
        
        <div class="stats-card">
            <div class="stats-row"><span>挑んだ難易度:</span><span id="res-diff" style="font-weight:bold;">-</span></div>
            <div class="stats-row"><span>残りプレイヤーライフ:</span><span id="res-life">-</span></div>
            <div class="stats-row"><span>獲得スコア:</span><span id="res-score" style="color:#d29922; font-weight:bold;">0</span></div>
        </div>

        <button class="action-btn" onclick="backToHome()">ホームへ戻る</button>
    </div>

<script>
    // 5段階の難易度設定
    const difficultySettings = {
        easy: {
            name: "第1層：のんびりスライム",
            maxHp: 75,
            timeLimit: 12,
            faces: ["(  'ч'  )", "( ˙-˙ )", "( ๑•﹏•)", "( ; ᯅ ; )"],
            unlocked: true,
            label: "初級"
        },
        normal: {
            name: "第2層：インテリ・ゴースト",
            maxHp: 125,
            timeLimit: 8,
            faces: ["( 🕶️_🕶️ )", "( ¬_¬ )", "( 💢¯-¯ )", "( º﹃º )"],
            unlocked: false,
            label: "中級"
        },
        hard: {
            name: "第3層：狂気のディクショナリー",
            maxHp: 200,
            timeLimit: 5,
            faces: ["(Ψ▼皿▼)Ψ", "凸(◣_◢)凸", "☠️( 👿 益 👿 )☠️", "(✘﹏✘)↯"],
            unlocked: false,
            label: "上級"
        },
        hell: {
            name: "第4層：阿鼻叫喚の文法魔人",
            maxHp: 300,
            timeLimit: 4,
            faces: ["(╬◣д◢)!!", "щ(ºДºщ)", "┌[ 💢 益 💢 ]┐", "┗(›´ω`‹ )┛"],
            unlocked: false,
            label: "地獄級"
        },
        myth: {
            name: "最上階：終焉の文豪ゼウス",
            maxHp: 500,
            timeLimit: 3,
            faces: ["(✨☯️_☯️✨)", "╰(◣﹏◢)╯", "🔥(╬ಠ益ಠ)🔥", "[†☠️†]"],
            unlocked: false,
            label: "神話級"
        }
    };

    // 国語問題データ (全40問 - 由来等の雑学問題を排出し、意味・四字熟語・ことわざに差し替え完了)
    const quizData = [
        { q: "「杜撰（ずさん）」の正しい意味は？", c: ["物事の手加減が極めていい加減で、誤りが多いこと", "計画が緻密で、一分の隙もないこと", "プライドが高く、他人の意見を一切聞き入れないこと", "言葉遣いが非常に丁寧で、礼儀正しいこと"], a: 0 },
        { q: "「慇懃（いんぎん）」の対義語として最も適切なものは？", c: ["無礼", "親切", "丁寧", "粗雑"], a: 0 },
        { q: "「一石二鳥」とほぼ同じ意味を持つ四字熟語は？", c: ["一挙両得", "呉越同舟", "馬耳東風", "四面楚歌"], a: 0 },
        { q: "「忖度（そんたく）」の正しい意味は？", c: ["他人の心や意図を推し量ること", "自分の意見を強引に通すこと", "他人の過ちを厳しく批判すること", "過去の行動を深く後悔すること"], a: 0 },
        { q: "「おもむろに」の正しい意味は？", c: ["ゆっくりと落ち着いて行動を起こす様子", "不意に、予期せず突然に物事が起きる様子", "大急ぎで慌たらしく準備をする様子", "渋々と不機嫌そうに席を立つ様子"], a: 0 },
        { q: "「敷居が高い」の本来の正しい使い方は？", c: ["相手に不義理や不作法があり、その人の家に行きにくい", "高級すぎたり格式が高すぎたりして、自分には入りにくい", "商品の値段が高すぎて、とても購入する決断ができない", "自分の実力が不足しているため、参加を躊躇してしまう"], a: 0 },
        { q: "「確信犯」の本来の正しい意味は？", c: ["道徳的・宗教的・政治的信念に基づき、正しいと信じて行う行為", "悪いことだと最初から知りつつ、確信を持って行う犯罪", "絶対に警察にバレないという絶対の自信がある知能犯罪", "複数人で事前に綿密な計画を立てて実行した組織的犯罪"], a: 0 },
        { q: "「破天荒」の本来の正しい意味は？", c: ["今まで誰も成し得なかった前人未到の偉業を達成すること", "豪快で荒っぽく、常識外れの破滅的な振る舞いをする様子", "前代未聞の大トラブルを起こして周囲を大混乱させること", "社会のルールや既存の秩序を完全に無視して暴れ回ること"], a: 0 },
        { q: "「憮然（ぶぜん）」の本来の正しい意味は？", c: ["失望や不満のために、ぼんやりとして言葉を失う様子", "怒りで激しく顔を真っ赤にして不機嫌になる様子", "自分の正義を信じて、毅然とした堂々たる態度をとる様子", "平気で図々しく、他人の迷惑を一切気に留めない様子"], a: 0 },
        { q: "「姑息（こそく）」の本来の正しい意味は？", c: ["根本的な解決をせず、一時の間に合わせでその場をしのぐこと", "卑怯でずるく、裏で他人の足を引っ張るような性質", "物事が長引いて停滞し、一向に前に進まなくなること", "計算高くてケチであり、自分の利益しか考えないこと"], a: 0 },
        { q: "「気の置けない」の正しい意味は？", c: ["気遣いや遠慮をする必要がなく、心から気楽に付き合えること", "相手を信用することができず、一瞬も油断できない様子", "相手の態度にトゲがあり、一緒にいて激しい緊張を伴うこと", "居心地が悪くて気まずく、その場からすぐに逃げ出したいこと"], a: 0 },
        { q: "仲間から離れて一人になり、助けがない状態を表す言葉は？", c: ["孤立", "凋落", "等閑", "穿鑿"], a: 0 },
        { q: "話の筋道が極めて明快であり、破綻がない様子を何というか？", c: ["論理的", "感性的", "情緒的", "恣意的"], a: 0 },
        { q: "「琴線（きんせん）に触れる」の正しい意味は？", c: ["素晴らしいものに深く心を動かされ、激しく感動すること", "相手の地雷やタブーをうっかり踏んで激怒させてしまうこと", "他人が必死に隠している重大な秘密を暴き立てること", "利害関係が一致し、一時的な同盟を結ぶことに合意すること"], a: 0 },
        { q: "「他山の石（たざんのいし）」の正しい意味は？", c: ["他人の誤った言動や失敗であっても、自分の修養の糧になること", "他人が成し遂げた非常に優れた業績や手本のこと", "自分には全く関係のない、遠くの場所で起きた出来事のこと", "いくら探しても手に入らない、極めて貴重な財宝のこと"], a: 0 },
        { q: "「役不足（やくぶそく）」の本来の正しい使い方は？", c: ["与えられた役目が、本人の実力に対して軽すぎること", "本人の実力が不足しており、役目を果たすのが困難なこと", "ドラマや舞台の配役において、出演する役者の人数が足りないこと", "不満のある不遇な役職を、上司から一方的に押し付けられること"], a: 0 },
        { q: "「潮時（しおどき）」の本来の正しい意味は？", c: ["物事を行うのに、最も適した丁度良い機会やタイミングのこと", "物事が完全に破綻し、すべてを諦めて身を引くべき最悪の瞬間のこと", "時代の流行が完全に廃れ、世間から忘れ去られた時のこと", "長年続いた人間関係に、完全に亀裂が入る瞬間のこと"], a: 0 },

        { q: "「玉砕（ぎょくさい）」の本来の正しい意味は？", c: ["名誉や大義を守るために、潔く死ぬこと（転じて全滅すること）", "高価な宝石を、ハンマーで粉々に砕いてしまうこと", "試合にわざと負けることで、チームの点数を減らされること", "勝負事を最初から放棄し、一切の努力をしないこと"], a: 0 },
        { q: "「形影相弔（けいえいそうちょう）」の正しい意味は？", c: ["孤独で、自分の影だけを相手に慰め合っている寂しい状態", "ドラマや舞台の配役において、出演する役者の人数が足りないこと", "不満のある不遇な役職を、上司から一方的に押し付けられること", "友人の片付けや準備を、すべて自分が手伝ってあげること"], a: 0 },
        { q: "「牽強付会（けんきょうふかい）」の正しい意味は？", c: ["自分の都合の良いように、理屈を強引にこじつけること", "重い荷物を、解けないように太い紐できつく縛ること", "今月の予算の総額を、計算機を使って正確に算出すること", "自分の将来の目標を、あえて非常に高く設定すること"], a: 0 },
        { q: "「喧騒」の正しい読み方は？", c: ["けんそう", "かんそう", "げんぞう", "きょうそう"], a: 0 }

    // ゲーム状態
    let currentDiffKey = 'easy';
    let currentDiff = difficultySettings.easy;
    let currentQuizIdx = 0;
    let enemyCurrentHp = 100;
    let playerLife = 3;
    let score = 0;
    let timerInterval = null;
    let timeLeft = 0;

    // 復習モード（鍛錬の書）関連の状態
    let isTrainingMode = false;
    let wrongQuestionIndices = []; 

    window.onload = function() {
        const savedProgress = sessionStorage.getItem('kotoba_tower_progress');
        if(savedProgress) {
            const unlockedKeys = JSON.parse(savedProgress);
            unlockedKeys.forEach(key => {
                if(difficultySettings[key]) difficultySettings[key].unlocked = true;
            });
        }
        
        const savedWrong = sessionStorage.getItem('kotoba_tower_wrong');
        if(savedWrong) {
            wrongQuestionIndices = JSON.parse(savedWrong);
        }

        renderHomeScreen();
    };

    // ホーム画面の描画
    function renderHomeScreen() {
        switchScreen('home-screen');
        
        const badge = document.getElementById('wrong-count-badge');
        const trainBtn = document.getElementById('training-start-btn');
        badge.innerText = `${wrongQuestionIndices.length}問`;
        
        if (wrongQuestionIndices.length > 0) {
            badge.className = "training-badge";
            trainBtn.disabled = false;
            trainBtn.onclick = () => startTraining();
        } else {
            badge.className = "training-badge empty";
            trainBtn.disabled = true;
            trainBtn.onclick = null;
        }

        const listContainer = document.getElementById('difficulty-list');
        listContainer.innerHTML = '';

        Object.keys(difficultySettings).forEach((key, index) => {
            const diff = difficultySettings[key];
            const btn = document.createElement('button');
            btn.className = 'difficulty-btn';
            btn.disabled = !diff.unlocked;
            
            const badgeClass = diff.unlocked ? 'badge unlocked' : 'badge locked';
            const badgeText = diff.unlocked ? 'ENTER' : 'LOCKED';

            btn.innerHTML = `
                <div class="btn-meta">
                    <div class="floor-num">BATTLE AREA 0${index + 1}</div>
                    <strong style="color:${diff.unlocked ? '#fff':'#8b949e'}; font-size: 1.15rem;">${diff.name}</strong> 
                    <div style="font-size:0.8rem; color:#8b949e; margin-top:4px;">
                        HP: <span style="color:#ff7b72">${diff.maxHp}</span> | 制限時間: <span style="color:#e3b341">${diff.timeLimit}s</span>
                    </div>
                </div>
                <span class="${badgeClass}">${badgeText}</span>
            `;

            btn.onclick = () => startBattle(key);
            listContainer.appendChild(btn);
        });
    }

    function startTraining() {
        isTrainingMode = true;
        playerLife = 3;
        score = 0;
        
        currentDiffKey = 'training';
        currentDiff = {
            name: "📗 内省の写本（鍛錬モード）",
            maxHp: wrongQuestionIndices.length * 25,
            timeLimit: 10,
            faces: ["(  📖_📖 )", "( 🔍_🔍 )", "( 💦 ＞＜ )", "( ＿ ＿ )"],
            label: "鍛錬の書"
        };
        enemyCurrentHp = currentDiff.maxHp;

        const randomWrongIdx = Math.floor(Math.random() * wrongQuestionIndices.length);
        currentQuizIdx = wrongQuestionIndices[randomWrongIdx];

        document.getElementById('enemy-name').innerText = currentDiff.name;
        updateEnemyUI();
        updatePlayerLifeUI();
        
        switchScreen('battle-screen');
        loadNextQuestion();
    }

    function startBattle(diffKey) {
        isTrainingMode = false;
        currentDiffKey = diffKey;
        currentDiff = difficultySettings[diffKey];
        enemyCurrentHp = currentDiff.maxHp;
        playerLife = 3;
        score = 0;
        
        currentQuizIdx = Math.floor(Math.random() * quizData.length);

        document.getElementById('enemy-name').innerText = currentDiff.name;
        updateEnemyUI();
        updatePlayerLifeUI();
        
        switchScreen('battle-screen');
        loadNextQuestion();
    }

    // 【修正版】元のクイズデータを破壊せず、その場限りのシャッフルと判定を行う変数
    let currentShuffledChoices = [];
    let currentCorrectIndexInShuffled = 0;

    function loadNextQuestion() {
        clearInterval(timerInterval);
        document.getElementById('nav-box').innerHTML = '';
        
        const quiz = quizData[currentQuizIdx];
        document.getElementById('question-box').innerText = quiz.q;

        const choicesBox = document.getElementById('choices-box');
        choicesBox.innerHTML = '';

        // 元データを破壊しないよう、選択肢の配列を安全にコピーしてシャッフル
        const choicesWithInidices = quiz.c.map((choice, index) => ({ choice, index }));
        choicesWithInidices.sort(() => Math.random() - 0.5);

        // シャッフル後の選択肢リストと、その中での正しい正解位置を記録
        currentShuffledChoices = choicesWithInidices.map(obj => obj.choice);
        currentCorrectIndexInShuffled = choicesWithInidices.findIndex(obj => obj.index === quiz.a);

        currentShuffledChoices.forEach((choice, index) => {
            const btn = document.createElement('button');
            btn.className = 'choice-btn';
            btn.innerText = choice;
            btn.onclick = () => handleAnswer(index); 
            choicesBox.appendChild(btn);
        });

        timeLeft = currentDiff.timeLimit;
        document.getElementById('timer-text').innerText = timeLeft;
        
        const timerFill = document.getElementById('timer-fill');
        timerFill.style.transition = 'none';
        timerFill.style.width = '100%';
        
        setTimeout(() => {
            timerFill.style.transition = `width ${timeLeft}s linear`;
            timerFill.style.width = '0%';
        }, 50);

        timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('timer-text').innerText = timeLeft;
            if(timeLeft <= 0) {
                handleAnswer(-1);
            }
        }, 1000);
    }

    function handleAnswer(selectedIndex) {
        clearInterval(timerInterval);
        
        const timerFill = document.getElementById('timer-fill');
        const computedStyle = window.getComputedStyle(timerFill);
        timerFill.style.width = computedStyle.width;
        timerFill.style.transition = 'none';

        // コピーされ、シャッフルされた現在の正しい位置を基準に合否判定
        const isCorrect = (selectedIndex === currentCorrectIndexInShuffled);
        const choiceButtons = document.querySelectorAll('.choice-btn');

        choiceButtons.forEach((btn, index) => {
            btn.disabled = true; 
            if (index === currentCorrectIndexInShuffled) {
                btn.style.backgroundColor = 'var(--success-color)';
                btn.style.border = '2px solid #fff';
            } else if (index === selectedIndex && !isCorrect) {
                btn.style.backgroundColor = 'var(--danger-color)';
            } else {
                btn.style.opacity = '0.4'; 
            }
        });

        if(isCorrect) {
            enemyCurrentHp = Math.max(0, enemyCurrentHp - 25);
            score += 150 + (timeLeft * 10);
            updateEnemyUI();

            const enemyPanel = document.getElementById('enemy-panel');
            enemyPanel.classList.add('enemy-shake');
            setTimeout(() => enemyPanel.classList.remove('enemy-shake'), 300);

            const faceArea = document.getElementById('enemy-face');
            const popText = document.createElement('div');
            popText.className = 'damage-pop';
            popText.innerText = "CRITICAL!! -25";
            faceArea.appendChild(popText);
            setTimeout(() => popText.remove(), 600);

            if (isTrainingMode) {
                wrongQuestionIndices = wrongQuestionIndices.filter(idx => idx !== currentQuizIdx);
                sessionStorage.setItem('kotoba_tower_wrong', JSON.stringify(wrongQuestionIndices));
            }
        } else {
            playerLife--;
            updatePlayerLifeUI();
            
            if (!isTrainingMode && !wrongQuestionIndices.includes(currentQuizIdx)) {
                wrongQuestionIndices.push(currentQuizIdx);
                sessionStorage.setItem('kotoba_tower_wrong', JSON.stringify(wrongQuestionIndices));
            }

            const battleScreen = document.getElementById('battle-screen');
            document.body.classList.add('player-damaged-flash');
            battleScreen.classList.add('player-shake', 'flash');
            
            setTimeout(() => {
                document.body.classList.remove('player-damaged-flash');
                battleScreen.classList.remove('player-shake', 'flash');
            }, 400);
        }

        const navBox = document.getElementById('nav-box');
        const nextBtn = document.createElement('button');
        nextBtn.className = 'next-btn';
        nextBtn.innerText = "内容を確認して進む ➔";
        nextBtn.onclick = () => {
            if(enemyCurrentHp <= 0) {
                endGame(true);
                return;
            }
            if(playerLife <= 0) {
                endGame(false);
                return;
            }

            if (isTrainingMode) {
                if (wrongQuestionIndices.length > 0) {
                    const randomWrongIdx = Math.floor(Math.random() * wrongQuestionIndices.length);
                    currentQuizIdx = wrongQuestionIndices[randomWrongIdx];
                } else {
                    endGame(true);
                    return;
                }
            } else {
                let nextIdx;
                do {
                    nextIdx = Math.floor(Math.random() * quizData.length);
                } while (nextIdx === currentQuizIdx && quizData.length > 1);
                currentQuizIdx = nextIdx;
            }
            loadNextQuestion();
        };
        navBox.appendChild(nextBtn);
    }

    function updateEnemyUI() {
        const hpPercent = (enemyCurrentHp / currentDiff.maxHp) * 100;
        document.getElementById('enemy-hp-fill').style.width = `${hpPercent}%`;
        document.getElementById('enemy-hp-text').innerText = `${enemyCurrentHp} / ${currentDiff.maxHp}`;

        const faceSpan = document.getElementById('face-span');
        if (hpPercent > 75) {
            faceSpan.innerText = currentDiff.faces[0];
        } else if (hpPercent > 45) {
            faceSpan.innerText = currentDiff.faces[1];
        } else if (hpPercent > 0) {
            faceSpan.innerText = currentDiff.faces[2];
        } else {
            faceSpan.innerText = currentDiff.faces[3];
        }
    }

    function updatePlayerLifeUI() {
        let hearts = "";
        for(let i=0; i<3; i++) {
            hearts += (i < playerLife) ? "❤️" : "🖤";
        }
        document.getElementById('player-life').innerText = hearts;
    }

    function endGame(isWin) {
        clearInterval(timerInterval);
        switchScreen('result-screen');

        const titleNode = document.getElementById('result-status');
        const artNode = document.getElementById('result-art');

        document.getElementById('res-diff').innerText = currentDiff.label;
        document.getElementById('res-life').innerText = "❤️".repeat(playerLife) + "🖤".repeat(3 - playerLife);
        document.getElementById('res-score').innerText = score + " PT";

        if(isWin) {
            titleNode.innerText = isTrainingMode ? "鍛錬完了！" : "討伐成功！";
            titleNode.className = "result-title win-title";
            artNode.innerText = "✨👑⚔️💥⚔️👑✨";
            
            if (!isTrainingMode) {
                unlockNextDifficulty();
            }
        } else {
            titleNode.innerText = "敗北...";
            titleNode.className = "result-title lose-title";
            artNode.innerText = "💀☠️👻☠️💀";
        }
    }

    function unlockNextDifficulty() {
        const keys = Object.keys(difficultySettings);
        const currentIndex = keys.indexOf(currentDiffKey);
        
        if(currentIndex !== -1 && currentIndex + 1 < keys.length) {
            const nextKey = keys[currentIndex + 1];
            difficultySettings[nextKey].unlocked = true;

            const unlockedList = keys.filter(k => difficultySettings[k].unlocked);
            sessionStorage.setItem('kotoba_tower_progress', JSON.stringify(unlockedList));
        }
    }

    function backToHome() {
        renderHomeScreen();
    }

    function switchScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }
</script>
