<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>英単語並び替え学習アプリ</title>
  <style>
    body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 20px; display: flex; justify-content: center; }
    .container { max-width: 600px; width: 100%; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); position: relative; }
    h1, h2 { text-align: center; color: #2c3e50; }
    .screen { display: none; }
    .screen.active { display: block; }
    label { font-weight: bold; display: block; margin-top: 15px; margin-bottom: 5px; }
    select, button { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
    button { background-color: #3498db; color: white; border: none; font-weight: bold; cursor: pointer; margin-top: 20px; transition: background 0.2s; }
    button:hover { background-color: #2980b9; }
    .unit-list { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 15px; }
    .unit-item { padding: 15px; border: 1px solid #e0e0e0; border-radius: 8px; background: #fff; display: flex; justify-content: space-between; align-items: center; transition: all 0.2s; }
    .unit-clickable { flex-grow: 1; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
    .unit-item:hover { background: #ebf5fb; border-color: #3498db; }
    .unit-item.cleared { background: #d4edda; border-color: #c3e6cb; color: #155724; }
    .unit-item.cleared .cleared-label::after { content: '✓ クリア済み'; font-size: 12px; font-weight: bold; margin-right: 10px; }
    
    /* リセット用ゴミ箱ボタンのスタイル */
    .btn-reset-unit { background: none; border: none; color: #e74c3c; cursor: pointer; font-size: 16px; width: auto; padding: 5px 10px; margin: 0; transition: transform 0.1s; }
    .btn-reset-unit:hover { transform: scale(1.2); }

    .progress-bar { background: #e0e0e0; border-radius: 10px; height: 10px; margin: 20px 0; overflow: hidden; }
    .progress-fill { background: #3498db; height: 100%; width: 0%; transition: width 0.3s; }
    .word-jp { font-size: 24px; font-weight: bold; text-align: center; margin: 20px 0; color: #2c3e50; }
    .answer-box { min-height: 50px; border-bottom: 3px solid #3498db; margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; align-items: center; padding: 10px; }
    .letters-box { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 20px; min-height: 60px; }
    .tile { background: white; border: 2px solid #bdc3c7; border-radius: 6px; width: 45px; height: 45px; display: flex; justify-content: center; align-items: center; font-size: 20px; font-weight: bold; cursor: pointer; user-select: none; box-shadow: 0 2px 5px rgba(0,0,0,0.1); transition: all 0.1s; }
    .tile:active { transform: scale(0.95); }
    .tile.selected { background: #e8f4fd; border-color: #3498db; color: #3498db; }
    .tile.answer-tile { background: #3498db; color: white; border-color: #3498db; }
    .nav-btns { display: flex; gap: 10px; }
    .btn-secondary { background-color: #95a5a6; }
    .btn-secondary:hover { background-color: #7f8c8d; }
    .result-score { font-size: 48px; font-weight: bold; text-align: center; margin: 20px 0; }
    .pass { color: #2ecc71; }
    .fail { color: #e74c3c; }
    .loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); justify-content: center; align-items: center; font-size: 20px; font-weight: bold; color: #2c3e50; z-index: 1000; }
    
    .btn-home { position: absolute; top: 15px; right: 15px; background-color: #e74c3c; color: white; border: none; padding: 6px 12px; border-radius: 6px; font-size: 13px; font-weight: bold; cursor: pointer; width: auto; margin-top: 0; z-index: 10; display: none; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .btn-home:hover { background-color: #c0392b; }

    .feedback-box { text-align: center; margin: 20px 0; padding: 20px; border-radius: 8px; }
    .feedback-box.correct { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .feedback-box.incorrect { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    .spell-display { font-size: 28px; font-weight: bold; letter-spacing: 2px; margin-top: 10px; font-family: monospace; }
    
    .weak-summary { text-align: center; font-size: 14px; color: #7f8c8d; margin-top: -10px; margin-bottom: 20px; }
  </style>
</head>
<body>

<div id="loading" class="loading-overlay">通信中...</div>

<div class="container">
  <button id="btn-global-home" class="btn-home" onclick="goHome()">🏠 ホームへ</button>

  <div id="screen-login" class="screen active">
    <h1>英単語学習アプリ</h1>
    
    <label for="grade-select">1. 学年を選択してください</label>
    <select id="grade-select" onchange="onGradeChange()">
      <option value="">読込中...</option>
    </select>
    
    <label for="student-select" style="margin-top: 20px;">2. 生徒名を選択してください</label>
    <select id="student-select" disabled>
      <option value="">学年を先に選択してください</option>
    </select>
    
    <button id="btn-login" onclick="login()">進む</button>
  </div>

  <div id="screen-menu" class="screen">
    <h2 id="menu-welcome"></h2>
    <div id="weak-count-info" class="weak-summary"></div>
    <button onclick="showUnits('Sunshine', '中1')">教科書内容 (Sunshine 中1)</button>
    <button onclick="showUnits('Sunshine', '中2')">教科書内容 (Sunshine 中2)</button>
    <button onclick="showUnits('Sunshine', '中3')">教科書内容 (Sunshine 中3)</button>
    <button onclick="showUnits('入試対策')" style="background-color: #e67e22; margin-top: 25px;">入試対策</button>
    <button id="btn-weak-test" onclick="startWeakTest()" style="background-color: #e74c3c; display: none;">🔥 苦手単語テストに挑戦</button>
    <button class="btn-secondary" onclick="changeScreen('login')">ログアウト</button>
  </div>

  <div id="screen-units" class="screen">
    <h2 id="units-title">単元を選択</h2>
    <div id="unit-list" class="unit-list"></div>
    <button class="btn-secondary" onclick="changeScreen('menu')">メニューに戻る</button>
  </div>

  <div id="screen-quiz" class="screen">
    <div style="display: flex; justify-content: space-between; font-size: 14px; color: #7f8c8d;">
      <span id="quiz-status">単元名</span>
      <span id="quiz-count">1 / 20</span>
    </div>
    <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
    
    <div id="word-jp" class="word-jp">日本語</div>
    <div id="answer-box" class="answer-box"></div>
    <div id="letters-box" class="letters-box"></div>
    
    <div class="nav-btns">
      <button class="btn-secondary" onclick="clearAnswer()">リセット</button>
      <button onclick="submitAnswer()">決定</button>
    </div>
  </div>

  <div id="screen-feedback" class="screen">
    <h2>解答確認</h2>
    <div id="feedback-result" class="feedback-box">
      <div id="feedback-msg" style="font-size: 20px; font-weight: bold;"></div>
      <div style="margin-top: 15px; font-size: 14px;">正しいスペル:</div>
      <div id="feedback-correct-spell" class="spell-display"></div>
      <div id="feedback-your-area" style="margin-top: 15px; font-size: 14px;">あなたの回答:</div>
      <div id="feedback-your-spell" style="font-size: 20px; font-weight: bold; color: #721c24;"></div>
    </div>
    <button id="btn-next-quiz" onclick="nextQuestion()">次へ進む</button>
  </div>

  <div id="screen-result" class="screen">
    <h2>結果発表</h2>
    <div id="result-score" class="result-score">0 / 0</div>
    <p id="result-text" style="text-align: center; font-size: 18px; font-weight: bold;"></p>
    <div id="result-weak-msg" style="text-align: center; color: #e74c3c; font-size: 14px; margin-bottom: 15px;"></div>
    <button id="btn-result-back" onclick="backToUnitSelection()">単元選択に戻る</button>
  </div>
</div>

<script>
  const GAS_URL = "https://script.google.com/macros/s/AKfycbyHgcZu5J1mYYKKjsdY4ChH_0a8hXq9-ilU_wWFz45b2X7ueaX3cwCqVwnNrav8vv0/exec";

  let studentName = "";
  let clearedUnits = [];
  let currentCategory = ""; 
  let currentUnit = "";
  let currentGradeContext = ""; // Sunshineの時にどの中学学年を指すか
  let questions = [];
  let currentIdx = 0;
  let correctCount = 0;
  let currentAnswer = [];
  let initialData = null;
  let isWeakTestMode = false;

  async function callGAS(payload) {
    document.getElementById('loading').style.display = 'flex';
    try {
      const response = await fetch(GAS_URL, {
        method: "POST",
        body: JSON.stringify(payload),
        headers: { "Content-Type": "text/plain" }
      });
      const json = await response.json();
      if (json.status === 'success') {
        return json.data;
      } else {
        alert("エラーが発生しました: " + json.message);
      }
    } catch (e) {
      alert("通信エラーが発生しました。");
      console.error(e);
    } finally {
      document.getElementById('loading').style.display = 'none';
    }
  }

  window.onload = async function() {
    initialData = await callGAS({ action: 'getInitialData' });
    if (initialData && initialData.students) {
      const gradeSelect = document.getElementById('grade-select');
      gradeSelect.innerHTML = '<option value="">学年を選択してください</option>';
      
      const grades = Object.keys(initialData.students).sort();
      grades.forEach(grade => {
        let opt = document.createElement('option');
        opt.value = grade;
        opt.textContent = grade;
        gradeSelect.appendChild(opt);
      });
    }
  };

  function onGradeChange() {
    const gradeSelect = document.getElementById('grade-select');
    const studentSelect = document.getElementById('student-select');
    const selectedGrade = gradeSelect.value;
    
    studentSelect.innerHTML = '';
    
    if (!selectedGrade) {
      studentSelect.innerHTML = '<option value="">学年を先に選択してください</option>';
      studentSelect.disabled = true;
      return;
    }
    
    studentSelect.innerHTML = '<option value="">生徒名を選択してください</option>';
    const students = initialData.students[selectedGrade] || [];
    
    students.forEach(name => {
      let opt = document.createElement('option');
      opt.value = name;
      opt.textContent = name;
      studentSelect.appendChild(opt);
    });
    
    studentSelect.disabled = false;
  }

  function changeScreen(screenId) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-' + screenId).classList.add('active');
    
    const homeBtn = document.getElementById('btn-global-home');
    if (['menu', 'units', 'quiz', 'feedback', 'result'].includes(screenId)) {
      homeBtn.style.display = 'block';
    } else {
      homeBtn.style.display = 'none';
    }
    
    if (screenId === 'login') {
      document.getElementById('grade-select').value = "";
      document.getElementById('student-select').innerHTML = '<option value="">学年を先に選択してください</option>';
      document.getElementById('student-select').disabled = true;
    }
  }

  function goHome() {
    if (confirm("現在の演習を中断してメニューに戻りますか？")) {
      updateMenuInfo();
      changeScreen('menu');
    }
  }

  async function login() {
    studentName = document.getElementById('student-select').value;
    if (!studentName) return alert('生徒を選択してください');
    
    document.getElementById('menu-welcome').textContent = `こんにちは、${studentName} さん`;
    clearedUnits = await callGAS({ action: 'getClearedUnits', studentName: studentName }) || [];
    
    updateMenuInfo();
    changeScreen('menu');
  }

  function updateMenuInfo() {
    const weakList = getWeakList();
    const infoDiv = document.getElementById('weak-count-info');
    const weakBtn = document.getElementById('btn-weak-test');
    
    if (weakList.length > 0) {
      infoDiv.textContent = `現在、間違えたままの苦手単語が ${weakList.length} 語あります。`;
      weakBtn.style.display = 'block';
    } else {
      infoDiv.textContent = `苦手単語はありません！素晴らしい！`;
      weakBtn.style.display = 'none';
    }
  }

  function getWeakList() {
    const key = `weak_words_${studentName}`;
    const data = localStorage.getItem(key);
    return data ? JSON.parse(data) : [];
  }

  function saveWeakList(list) {
    const key = `weak_words_${studentName}`;
    localStorage.setItem(key, JSON.stringify(list));
  }

  function addWeakWord(questionObj) {
    let list = getWeakList();
    if (!list.some(item => item.english === questionObj.english)) {
      list.push({
        japanese: questionObj.japanese,
        english: questionObj.english
      });
      saveWeakList(list);
    }
  }

  function removeWeakWord(englishWord) {
    let list = getWeakList();
    list = list.filter(item => item.english !== englishWord);
    saveWeakList(list);
  }

  // 単元選択画面の生成（履歴リセット機能付き）
  function showUnits(category, gradeContext = '') {
    isWeakTestMode = false;
    currentCategory = category;
    currentGradeContext = gradeContext;
    
    document.getElementById('units-title').textContent = 
      category === 'Sunshine' ? `教科書内容 (Sunshine ${gradeContext})` : '入試対策';
      
    const listDiv = document.getElementById('unit-list');
    listDiv.innerHTML = '';
    
    // 空白対策：データが存在する有効な単元のみ取得
    const units = category === 'Sunshine' ? (initialData.sunshineUnits[gradeContext] || []) : initialData.examUnits;
    
    units.forEach(unit => {
      if (!unit || unit.toString().trim() === "") return; // 念のための空白防止
      
      const item = document.createElement('div');
      item.className = 'unit-item';
      
      const unitKey = category === 'Sunshine' ? `${category}:${gradeContext}:${unit}` : `${category}:${unit}`;
      if (clearedUnits.includes(unitKey)) {
        item.classList.add('cleared');
      }
      
      // クリック領域（テスト開始）
      const clickArea = document.createElement('div');
      clickArea.className = 'unit-clickable';
      
      const titleSpan = document.createElement('span');
      titleSpan.textContent = unit;
      clickArea.appendChild(titleSpan);
      
      const labelSpan = document.createElement('span');
      labelSpan.className = 'cleared-label';
      clickArea.appendChild(labelSpan);
      
      clickArea.onclick = function() { startQuiz(unit); };
      item.appendChild(clickArea);
      
      // 学習履歴リセットボタン（ゴミ箱マーク）
      const resetBtn = document.createElement('button');
      resetBtn.className = 'btn-reset-unit';
      resetBtn.innerHTML = '🗑️';
      resetBtn.title = 'この単員のクリア履歴をリセットする';
      resetBtn.onclick = async function(e) {
        e.stopPropagation(); // テスト開始イベントの発火を防ぐ
        if (confirm(`「${unit}」のクリア履歴をリセットして未クリア状態に戻しますか？`)) {
          await callGAS({ action: 'resetUnitHistory', studentName: studentName, unitKey: unitKey });
          // 最新の履歴状況を再読込
          clearedUnits = await callGAS({ action: 'getClearedUnits', studentName: studentName }) || [];
          showUnits(currentCategory, currentGradeContext); // 画面再描画
        }
      };
      item.appendChild(resetBtn);
      
      listDiv.appendChild(item);
    });
    changeScreen('units');
  }

  async function startQuiz(unitName) {
    currentUnit = unitName;
    document.getElementById('quiz-status').textContent = unitName;
    
    questions = await callGAS({ 
      action: 'getQuestions', 
      category: currentCategory, 
      unitName: currentUnit, 
      gradeContext: currentGradeContext 
    }) || [];
    
    if (questions.length === 0) {
      alert("この単元には有効な問題データが登録されていません。");
      return;
    }
    
    currentIdx = 0;
    correctCount = 0;
    showQuestion();
    changeScreen('quiz');
  }

  function startWeakTest() {
    isWeakTestMode = true;
    currentUnit = "苦手克服テスト";
    document.getElementById('quiz-status').textContent = currentUnit;
    
    let rawWeakList = getWeakList();
    if (rawWeakList.length === 0) return alert("苦手単語はありません。");
    
    rawWeakList = shuffleArray(rawWeakList).slice(0, 20);
    
    questions = rawWeakList.map(q => {
      let letters = q.english.replace(/\s+/g, '').split('');
      const dummyCount = Math.floor(Math.random() * 3) + 2; 
      const alphabet = 'abcdefghijklmnopqrstuvwxyz';
      for (let i = 0; i < dummyCount; i++) {
        letters.push(alphabet[Math.floor(Math.random() * alphabet.length)]);
      }
      return {
        japanese: q.japanese,
        english: q.english,
        choices: shuffleArray(letters)
      };
    });

    currentIdx = 0;
    correctCount = 0;
    showQuestion();
    changeScreen('quiz');
  }

  function showQuestion() {
    currentAnswer = [];
    const q = questions[currentIdx];
    
    document.getElementById('quiz-count').textContent = `${currentIdx + 1} / ${questions.length}`;
    document.getElementById('progress-fill').style.width = `${((currentIdx) / questions.length) * 100}%`;
    document.getElementById('word-jp').textContent = q.japanese;
    
    document.getElementById('answer-box').innerHTML = '';
    const lettersBox = document.getElementById('letters-box');
    lettersBox.innerHTML = '';
    
    q.choices.forEach((letter, idx) => {
      const tile = document.createElement('div');
      tile.className = 'tile';
      tile.textContent = letter;
      tile.dataset.idx = idx;
      tile.onclick = function() { selectLetter(tile, letter, idx); };
      lettersBox.appendChild(tile);
    });
  }

  function selectLetter(tile, letter, idx) {
    if (tile.classList.contains('selected')) return;
    
    tile.classList.add('selected');
    currentAnswer.push({ letter: letter, originIdx: idx });
    
    const ansBox = document.getElementById('answer-box');
    const ansTile = document.createElement('div');
    ansTile.className = 'tile answer-tile';
    ansTile.textContent = letter;
    ansBox.appendChild(ansTile);
  }

  function clearAnswer() {
    currentAnswer = [];
    document.getElementById('answer-box').innerHTML = '';
    document.querySelectorAll('.letters-box .tile').forEach(t => t.classList.remove('selected'));
  }

  function submitAnswer() {
    const q = questions[currentIdx];
    const userAnswer = currentAnswer.map(a => a.letter).join('');
    
    const cleanTarget = q.english.replace(/[^a-zA-Z0-9]/g, '').toLowerCase();
    const cleanUser = userAnswer.replace(/[^a-zA-Z0-9]/g, '').toLowerCase();
    
    const isCorrect = (cleanTarget === cleanUser);
    
    if (isCorrect) {
      correctCount++;
      removeWeakWord(q.english);
    } else {
      addWeakWord(q);
    }

    const feedbackResult = document.getElementById('feedback-result');
    const feedbackMsg = document.getElementById('feedback-msg');
    const feedbackCorrect = document.getElementById('feedback-correct-spell');
    const feedbackYourSpell = document.getElementById('feedback-your-spell');
    const yourAreaLabel = document.getElementById('feedback-your-area');

    feedbackCorrect.textContent = q.english;

    if (isCorrect) {
      feedbackResult.className = "feedback-box correct";
      feedbackMsg.textContent = "⭕ 正解！";
      feedbackYourSpell.textContent = "";
      yourAreaLabel.style.display = "none";
    } else {
      feedbackResult.className = "feedback-box incorrect";
      feedbackMsg.textContent = "❌ 不正解... (苦手リストに登録されました)";
      feedbackYourSpell.textContent = userAnswer ? userAnswer : "(未入力)";
      yourAreaLabel.style.display = "block";
    }

    changeScreen('feedback');
    setTimeout(() => document.getElementById('btn-next-quiz').focus(), 50);
  }

  async function nextQuestion() {
    currentIdx++;
    if (currentIdx < questions.length) {
      showQuestion();
      changeScreen('quiz');
    } else {
      await endQuiz();
    }
  }

  async function endQuiz() {
    const scoreDiv = document.getElementById('result-score');
    const textP = document.getElementById('result-text');
    const weakMsgP = document.getElementById('result-weak-msg');
    const rate = correctCount / questions.length;
    const isPassed = rate >= 0.9; 
    
    scoreDiv.textContent = `${correctCount} / ${questions.length}`;
    
    if (isWeakTestMode) {
      scoreDiv.className = isPassed ? "result-score pass" : "result-score fail";
      textP.textContent = isPassed ? "🎉 苦手克服おめでとう！" : "まだ少し苦手が残っています。復習しよう！";
      weakMsgP.textContent = `※正解した単語は苦手リストから自動削除されました。`;
    } else {
      const unitKey = currentCategory === 'Sunshine' ? `${currentCategory}:${currentGradeContext}:${currentUnit}` : `${currentCategory}:${currentUnit}`;
      
      if (isPassed) {
        scoreDiv.className = "result-score pass";
        textP.textContent = "🎉 合格！おめでとう！";
        if (!clearedUnits.includes(unitKey)) {
          clearedUnits.push(unitKey);
        }
      } else {
        scoreDiv.className = "result-score fail";
        textP.textContent = "あと少し！もう一度挑戦しよう。";
      }
      weakMsgP.textContent = "";
      
      await callGAS({ action: 'recordResult', studentName: studentName, unitKey: unitKey, isCleared: isPassed });
    }
    
    changeScreen('result');
  }

  function backToUnitSelection() {
    if (isWeakTestMode) {
      updateMenuInfo();
      changeScreen('menu');
    } else {
      showUnits(currentCategory, currentGradeContext);
    }
  }

  function shuffleArray(array) {
    const result = [...array];
    for (let i = result.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [result[i], result[j]] = [result[j], result[i]];
    }
    return result;
  }
</script>

</body>
</html>
