    <h1>中2数学 確認テスト（式の計算・文字式の利用・等式の変形）</h1>
    <div class="card">
        <p>※ノートに解答を記入し、最後に「テストを終了して採点ページへ」を押して確認してください。</p>

            <div class="category-header">第1ブロック：単項式・多項式の分類と次数（10問）</div>

    <button class="btn" onclick="location.reload()">テストTOPに戻る</button>
</div>

<script>
const selectedQuestions = [
    // 第1ブロック：単項式・多項式の分類と次数 (1-10)
    { id: 1, type: "記号選択", cat: 1, q: "次の多項式のうち、「二次式」であるものを正しく選んだ組み合わせを答えなさい。<br>ア：$ab+c-d$ &nbsp;&nbsp; イ：$x^2y-xy+1$ &nbsp;&nbsp; ウ：$\\frac{2}{5}a^2$ &nbsp;&nbsp; エ：$7x-7y$", options: ["ア と ウ", "イ と エ", "ア と エ", "ウ と エ"], a: "ア", ans_literal: "ア と ウ", e: "アの最高次の項は $ab$ で2文字（2次）、ウは $a^2$ で2次なので、どちらも2次式です。イは3次式、エは1次式です。" },
    { id: 2, type: "記号選択", cat: 1, q: "多項式 $x^2y-xy+1$ の次数を答えなさい。", options: ["1次", "2次", "3次", "4次"], a: "ウ", ans_literal: "3次", e: "各項の次数のうち、最も高いものが多項式の次数になります。第一項の $x^2y$ は文字が3個掛け合わされているため3次項であり、この多項式は3次式です。" },
    { id: 3, type: "記号選択", cat: 1, q: "単項式 $-4x$ の次数を答えなさい。", options: ["0次", "1次", "2次", "3次"], a: "イ", ans_literal: "1次", e: "掛け合わされている文字の個数は $x$ の1個だけなので、次数は1（1次式）です。" },
    { id: 4, type: "記号選択", cat: 1, q: "多項式 $8a-b-7a+2b$ の同類項の正しいペアを選びなさい。", options: ["$8a$ と $-b$", "$8a$ と $-7a$、$-b$ と $2b$", "$8a$ と $2b$", "同類項はない"], a: "イ", ans_literal: "$8a$ と $-7a$、$-b$ と $2b$", e: "文字の部分が全く同じである項を同類項といいます。$a$ の項どうし、$b$ の項どうしがそれぞれ同類項です。" },
    { id: 5, type: "記号選択", cat: 1, q: "次の単項式のうち、次数が最も高いものを選びなさい。", options: ["$2a$", "$-9b$", "$(-2a)^2$", "$12ab$"], a: "ウ", ans_literal: "$(-2a)^2$", e: "$(-2a)^2 = 4a^2$ となり、文字が2個掛け合わされているため2次です。他はすべて1次です。" },
    { id: 6, type: "記号選択", cat: 1, q: "次の式のうち、文字式における定数（数だけの項）や定数項の説明として正しいものを選びなさい。", options: ["文字が最も多く掛け合わされた項", "数だけからなる項", "係数が0の項", "符号がマイなすの項"], a: "イ", ans_literal: "数だけからなる項", e: "多項式の中で、文字を含まず数だけで表されている項を定数項といいます。" },
    { id: 7, type: "記号選択", cat: 1, q: "多項式 $4x-2y-7+2x$ の項をすべて正しく並べたものを選びなさい。", options: ["$4x$, $2y$, $7$, $2x$", "$4x$, $-2y$, $-7$, $2x$", "$6x$, $-2y$, $-7$", "$4x$, $-2y$"], a: "イ", ans_literal: "$4x$, $-2y$, $-7$, $2x$", e: "加法の形に直したときのそれぞれの要素が項です。符号を含めて $4x$, $-2y$, $-7$, $2x$ となります。" },
    { id: 8, type: "記号選択", cat: 1, q: "数式において、アルファベットの「前のほうの文字（$a, b, c$など）」と「後ろのほうの文字（$x, y, z$など）」は一般にどのように使い使い分けられる習慣がありますか。", options: ["前が変数、後ろが定数", "前が定数、後ろが変数・未知数", "前が自然数、後ろが円周率", "特に使い分けの習慣はない"], a: "イ", ans_literal: "前が定数、後ろが変数・未知数", e: "数学の習慣として $a, b, c$ などは定数に、$x, y, z$ などは変数や未知数に使われます。" },
    { id: 9, type: "記号選択", cat: 1, q: "面積を表す $S$、体積を表す $V$、半径を表す $r$、時間などを表す $t$ は、何に由来して使われていますか。", options: ["ギリシア文字の順番", "英語の頭文字", "発見した数学者の名前", "明治時代の日本の法律"], a: "イ", ans_literal: "英語の頭文字", e: "半径(radius)、時間(time)、面積(Surface)、体積(Volume)など、いずれも英語の頭文字に由来しています。" },
    { id: 10, type: "記号選択", cat: 1, q: "円周率を表す $\\pi$ は、どこの国の文字から世界共通で使われていますか。", options: ["ラテン文字", "ギリシア文字", "アラビア文字", "キリル文字"], a: "イ", ans_literal: "ギリシア文字", e: "$\\pi$ はギリシア語のアルファベットで、円周を表すギリシア語の頭文字に由来し世界共通で使用されています。" },

    // 第2ブロック：多項式の加減・同類項・筆算 (11-25)
    { id: 11, type: "一問一答", cat: 2, q: "次の式の同類項をまとめなさい。<br>$3x-7y+4x$", a: "$7x-7y$", e: "$3x+4x=7x$。$y$ の項を合わせて $7x-7y$ です。" },
    { id: 12, type: "一問一答", cat: 2, q: "次の式の同類項をまとめなさい。<br>$8a-b-7a+2b$", a: "$a+b$", e: "$8a-7a=a$、$-b+2b=b$ より、 $a+b$ となります。" },
    { id: 13, type: "一問一答", cat: 2, q: "次の式の同類項をまとめなさい。<br>$-5x+9y+3x-8y$", a: "$-2x+y$", e: "$-5x+3x=-2x$、$9y-8y=y$ より、 $-2x+y$ となります。" },
    { id: 14, type: "一問一答", cat: 2, q: "次の式の同類項をまとめなさい。<br>$3x^2-5x-2x^2+x$", a: "$x^2-4x$", e: "$3x^2-2x^2=x^2$、$-5x+x=-4x$ より、 $x^2-4x$ となります。" },
    { id: 15, type: "一問一答", cat: 2, q: "次の式の同類項をまとめなさい。<br>$8a^2-5a-2+7a$", a: "$8a^2+2a-2$", e: "$-5a+7a=2a$。整理して $8a^2+2a-2$ です。" },
    { id: 16, type: "一問一答", cat: 2, q: "次の式の同類項をまとめなさい。<br>$4x-2y-7+2x$", a: "$6x-2y-7$", e: "$4x+2x=6x$ より、 $6x-2y-7$ となります。" },
    { id: 17, type: "一問一答", cat: 2, q: "次の2つの多項式をたしなさい。<br>$3a+2b$ と $a-4b$", a: "$4a-2b$", e: "$(3a+2b)+(a-4b) = 3a+a+2b-4b = 4a-2b$ となります。" },
    { id: 18, type: "一問一答", cat: 2, q: "多項式 $3a+2b$ から多項式 $a-4b$ をひきなさい。", a: "$2a+6b$", e: "$(3a+2b)-(a-4b) = 3a-a+2b+4b = 2a+6b$ となります。" },
    { id: 19, type: "一問一答", cat: 2, q: "次の2つの多項式をたしなさい。<br>$x-4y$ と $-2x+3y$", a: "$-x-y$", e: "$(x-4y)+(-2x+3y) = x-2x-4y+3y = -x-y$ となります。" },
    { id: 20, type: "一問一答", cat: 2, q: "多項式 $x-4y$ から多項式 $-2x+3y$ をひきなさい。", a: "$3x-7y$", e: "$(x-4y)-(-2x+3y) = x+2x-4y-3y = 3x-7y$ となります。" },
    { id: 21, type: "一問一答", cat: 2, q: "次の計算をしなさい。<br>$3x^2+3x+1-(4x+2x^2)$", a: "$x^2-x+1$", e: "$3x^2-2x^2=x^2$、$3x-4x=-x$ より $x^2-x+1$ です。" },
    { id: 22, type: "一問一答", cat: 2, q: "次の計算をしなさい。<br>$0.7x+y-(-1.4x+y)$", a: "$2.1x$", e: "かっこを外すと $0.7x+y+1.4x-y$ となり、$y$ が相殺されて $2.1x$ です。" },
    { id: 23, type: "一問一答", cat: 2, q: "次の縦書きの計算をしなさい。<br><div class='vertical-calc-box'>&nbsp;&nbsp;3x + 4y<br>+)&nbsp;2x - 2y<br><div class='vertical-calc-line'></div>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</div>", a: "$5x+2y$", e: "縦の同類項どうしを足します。$3x+2x=5x$、$4y+(-2y)=2y$ より $5x+2y$ です。" },
    { id: 24, type: "一問一答", cat: 2, q: "次の縦書きの計算をしなさい。<br><div class='vertical-calc-box'>&nbsp;&nbsp;a - 2b<br>-)&nbsp;-a - 3b<br><div class='vertical-calc-line'></div>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</div>", a: "$2a+b$", e: "引き算なので下の式の符号を反転して足します。$a-(-a)=2a$、$-2b-(-3b)=b$ より $2a+b$ です。" },
    { id: 25, type: "一問一答", cat: 2, q: "次の縦書きの計算をしなさい。<br><div class='vertical-calc-box'>&nbsp;&nbsp;25x - &nbsp;3y + 6<br>-)&nbsp;&nbsp;5x - 10y + 6<br><div class='vertical-calc-line'></div>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</div>", a: "$20x+7y$", e: "$25x-5x=20x$、$-3y-(-10y)=7y$、$6-6=0$。答えは $20x+7y$ です。" },

    // 第3ブロック：単項式の乗除・分数を含む計算 (26-45)
    { id: 26, type: "一問一答", cat: 3, q: "次の計算をしなさい。<br>$5x \\times (-2x)$", a: "$-10x^2$", e: "係数どうし、文字どうしを計算します。$5 \\times (-2) = -10$, $x \\times x = x^2$ より $-10x^2$ です。" },
    { id: 27, type: "一問一答", cat: 3, q: "次の計算をしなさい。<br>$12m \\div 2m$", a: "6", e: "$\\frac{12m}{2m} = 6$ となります。文字 $m$ は約分されて消えます。" },
    { id: 28, type: "一問一答", cat: 3, q: "次の計算をしなさい。<br>$(-4x)^2$", a: "$16x^2$", e: "$(-4x) \\times (-4x) = 16x^2$ です。マイナスも2乗されるため符号はプラスになります。" },
    { id: 29, type: "一問一答", cat: 3, q: "次の計算をしなさい。<br>$\\frac{2}{3}xy \\times \\frac{1}{4}x$", a: "$\\frac{1}{6}x^2y$", e: "係数の計算は $\\frac{2}{3} \\times \\frac{1}{4} = \\frac{1}{6}$。文字を合わせて $\\frac{1}{6}x^2y$ となります。" },
    { id: 30, type: "一問一答", cat: 3, q: "次の計算をしなさい。<br>$\\frac{2}{5}x \\times (-10y^2)$", a: "$-4xy^2$", e: "$\\frac{2}{5} \\times (-10) = -4$。文字をあわせて $-4xy^2$ です。" },
    { id: 31, type: "一問一答", cat: 3, q: "次の計算をしなさい。<br>$2a \\times (-9b)$", a: "$-18ab$", e: "$2 \\times (-9) = -18$。文字は $ab$ なので $-18ab$ です。" },
    { id: 32, type: "一問一答", cat: 3, q: "次の計算をしなさい。<br>$(-6x) \\times (-3y)$", a: "$18xy$", e: "負の数どうしの掛け算なのでプラスになります。答えは $18xy$ です。" },
    { id: 33, type: "一問一答", cat: 3, q: "次の計算をしなさい。<br>$(-2a)^2$", a: "$4a^2$", e: "$(-2a) \\times (-2a) = 4a^2$ です。" },
    { id: 34, type: "一問一答", cat: 3, q: "次の計算をしなさい。<br>$(-4x)^2 \\times y$", a: "$16x^2y$", e: "先に累乗を計算します。$16x^2 \\times y = 16x^2y$ です。" },
    { id: 35, type: "一問一答", cat: 3, q: "次の計算をしなさい。<br>$12ab \\div 3b$", a: "$4a$", e: "$\\frac{12ab}{3b} = 4a$ となります。" },
    { id: 36, type: "一問一答", cat: 3, q: "次の計算をしなさい。<br>$3x^2 \\div x$", a: "$3x$", e: "$\\frac{3x^2}{x} = 3x$ となります。" },
    { id: 37, type: "一問一答", cat: 3, q: "次の計算をしなさい。<br>$5(4a-5b)$", a: "$20a-25b$", e: "分配法則により、かっこ内の各項に5を掛けます。$20a-25b$ です。" },
    { id: 38, type: "一問一答", cat: 3, q: "次の計算をしなさい。<br>$-3(4x-9y)$", a: "$-12x+27y$", e: "$-3$ を分配します。後半の項の符号が $+27y$ に変わる点に注意します。" },
    { id: 39, type: "一問一答", cat: 3, q: "次の計算をしなさい。<br>$(-28x+21y) \\div 7$", a: "$-4x+3y$", e: "各項を7で割ります。$\\frac{-28x}{7} + \\frac{21y}{7} = -4x+3y$ です。" },
    { id: 40, type: "一問一答", cat: 3, q: "次の計算をしなさい。<br>$(36a-24b) \\div (-4)$", a: "$-9a+6b$", e: "各項を $-4$ で割るため、すべての符号が反転します。$-9a+6b$ です。" },
    { id: 41, type: "一問一答", cat: 3, q: "次の計算をしなさい。<br>$5x+2(x-2y)$", a: "$7x-4y$", e: "かっこを外すと $5x+2x-4y$ となり、同類項をまとめて $7x-4y$ です。" },
    { id: 42, type: "一問一答", cat: 3, q: "次の計算をしなさい。<br>$2(2x-y)+(5x-y)$", a: "$9x-3y$", e: "展開して $4x-2y+5x-y = 9x-3y$ となります。" },
    { id: 43, type: "一問一答", cat: 3, q: "次の計算をしなさい。<br>$3(x+y)-3(x-y)$", a: "$6y$", e: "展開すると $3x+3y-3x+3y$。$3x$ が消えて $6y$ となります。" },
    { id: 44, type: "一問一答", cat: 3, q: "次の計算をしなさい。<br>$5(4a+b)-6(5a-b+3)$", a: "$-10a+11b-18$", e: "展開すると $20a+5b-30a+6b-18$。同類項を整理して $-10a+11b-18$ です。" },
    { id: 45, type: "一問一答", cat: 3, q: "次の計算をしなさい。<br>$\\frac{1}{2}(4x-y)+\\frac{1}{3}(x+2y)$", a: "$\\frac{14x+y}{6}$", e: "展開すると $2x-\\frac{1}{2}y+\\frac{1}{3}x+\\frac{2}{3}y$ となります。通分を行うと、全体の分子は $12x-3y+2x+4y$ となるため、整理して $\\frac{14x+y}{6}$ となります。" },

    // 第4ブロック：等式の変形・文字について解く (46-56)
    { id: 46, type: "一問一答", cat: 4, q: "等式 $x+2y=3$ を $x$ について解きなさい。", a: "$x=3-2y$", e: "両辺から $2y$ を移項する（ひく）ことで、$x=3-2y$ と変形できます。" },

let timeLeft = 40 * 60;
const timerDisplay = document.getElementById('timer');
const userScores = new Array(selectedQuestions.length).fill(null);

function generateQuestions() {
    selectedQuestions.forEach(q => {
        const container = document.getElementById(`questions-container-${q.cat}`);
        if (!container) return;
        
        const div = document.createElement('div');
        div.className = 'question-item';
        let content = `<span class="q-num">問${q.id}</span> <span class="q-type">${q.type}</span><br>${q.q}`;
        
        if (q.type === "記号選択" && q.options) {
            content += `<div class="options-container">`;
            const labels = ["ア", "イ", "ウ", "エ"];
            q.options.forEach((opt, i) => {
                content += `<div class="option-item">${labels[i]}：${opt}</div>`;
            });
            content += `</div>`;
        }
        
        div.innerHTML = content;
        container.appendChild(div);
    });

    if (window.MathJax) {
        MathJax.typesetPromise();
    }
}

function showAnswers() {
    clearInterval(countdown);
    document.getElementById('test-page').classList.remove('active');
    document.getElementById('answer-page').classList.add('active');
    document.getElementById('score-bar').style.display = 'block';
    
    const container = document.getElementById('answers-container');
    container.innerHTML = "";
    
    selectedQuestions.forEach((q, idx) => {
        const div = document.createElement('div');
        div.className = 'ans-item';
        
        let qContent = `<div class="ans-q-text"><span class="q-num">問${q.id}</span> [${q.type}] ${q.q}`;
        if (q.type === "記号選択" && q.options) {
            qContent += `<div class="options-container">`;
            const labels = ["ア", "イ", "ウ", "エ"];
            q.options.forEach((opt, i) => {
                qContent += `<div class="option-item">${labels[i]}：${opt}</div>`;
            });
            qContent += `</div>`;
        }
        qContent += `</div>`;

        let targetAnswer = q.a;
        if (q.type === "記号選択" && q.ans_literal) {
            targetAnswer = `${q.a} （${q.ans_literal}）`;
        }

        div.innerHTML = `
            ${qContent}
            <div><span class="ans-correct">正解：${targetAnswer}</span></div>
            <div class="ans-explanation"><strong>解説:</strong> ${q.e}</div>
            <div class="scoring-btns">
                <button class="score-btn btn-correct" id="btn-c-${idx}" onclick="setScore(${idx}, true)">○ 正解</button>
                <button class="score-btn btn-wrong" id="btn-w-${idx}" onclick="setScore(${idx}, false)">× 不正解</button>
            </div>
        `;
        container.appendChild(div);
    });

    if (window.MathJax) {
        MathJax.typesetPromise();
    }

    window.scrollTo(0, 0);
}

const countdown = setInterval(() => {
    let minutes = Math.floor(timeLeft / 60);
    let seconds = timeLeft % 60;
    if (timerDisplay) {
        timerDisplay.innerText = `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
    }
    if (timeLeft <= 0) {
        clearInterval(countdown);
        alert('時間終了です！採点ページへ移ります。');
        showAnswers();
    }
    timeLeft--;
}, 1000);

function setScore(idx, isCorrect) {
    userScores[idx] = isCorrect;
    
    const btnCorrect = document.getElementById(`btn-c-${idx}`);
    const btnWrong = document.getElementById(`btn-w-${idx}`);
    
    if (isCorrect) {
        btnCorrect.classList.add('selected');
        btnWrong.classList.remove('selected');
    } else {
        btnCorrect.classList.remove('selected');
        btnWrong.classList.add('selected');
    }
    updateScore();
}

function updateScore() {
    const correctCount = userScores.filter(s => s === true).length;
    document.getElementById('correct-count').innerText = correctCount;
    document.getElementById('score-val').innerText = Math.round((correctCount / selectedQuestions.length) * 100);
}

generateQuestions();
</script>
