<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>国語3年 定期テスト対策実力テスト（握手・論語）</title>
    <style>
        body { font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif; line-height: 1.6; max-width: 900px; margin: 0 auto; padding: 20px; background-color: #f0f2f5; color: #333; }
        .page { display: none; }
        .active { display: block; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 20px; }
        h1 { color: #1a365d; text-align: center; border-bottom: 3px solid #1a365d; padding-bottom: 10px; margin-bottom: 30px; }
        #timer-bar, #score-bar { position: sticky; top: 0; background: #c53030; color: white; padding: 10px; text-align: center; font-weight: bold; border-radius: 5px; z-index: 1000; font-size: 1.2em; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        #score-bar { background: #2f855a; top: 50px; display: none; }
        .question-item { margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px dashed #cbd5e0; }
        .q-num { font-weight: bold; color: #2b6cb0; margin-right: 10px; }
        .q-type { font-size: 0.8em; background: #edf2f7; padding: 2px 8px; border-radius: 4px; margin-left: 10px; color: #4a5568; }
        .options-container { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; }
        .option-item { background: #fff; border: 1px solid #2b6cb0; padding: 5px 15px; border-radius: 20px; font-size: 0.9em; color: #2b6cb0; }
        .btn { display: block; width: 100%; padding: 15px; background: #2b6cb0; color: white; border: none; border-radius: 8px; font-size: 1.1em; cursor: pointer; text-align: center; margin-top: 20px; text-decoration: none; }
        .btn:hover { background: #2c5282; }
        .scoring-btns { margin-top: 10px; display: flex; gap: 10px; }
        .score-btn { flex: 1; padding: 8px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-correct { background: #e6fffa; color: #234e52; border: 1px solid #38b2ac; }
        .btn-correct.selected { background: #38b2ac; color: white; }
        .btn-wrong { background: #fff5f5; color: #742a2a; border: 1px solid #f56565; }
        .btn-wrong.selected { background: #f56565; color: white; }
        .ans-item { margin-bottom: 20px; padding: 15px; background: #f7fafc; border-left: 4px solid #2f855a; }
        .ans-q-text { font-size: 0.95em; color: #4a5568; margin: 10px 0; border-bottom: 1px solid #e2e8f0; padding-bottom: 10px; }
        .ans-correct { font-weight: bold; color: #2f855a; font-size: 1.1em; }
        .ans-explanation { font-size: 0.9em; color: #4a5568; margin-top: 5px; background: #fff; padding: 10px; border-radius: 4px; line-height: 1.5; }
        .category-header { background: #4a5568; color: white; padding: 8px 15px; margin: 30px 0 15px 0; border-radius: 5px; font-size: 1em; font-weight: bold; }
        .text-box { background: #f7fafc; border: 1px solid #cbd5e0; padding: 12px; margin: 8px 0; border-radius: 6px; font-family: "Georgia", serif; font-size: 1.05em; }
    </style>
</head>
<body>

<div id="test-page" class="page active">
    <div id="timer-bar">残り時間: <span id="timer">30:00</span></div>
    <h1>国語 定期テスト対策実力テスト</h1>
    <div class="card">
        <p>※手元にノートと教科書を用意して解答を記入してください。「握手」は本文が載っていないため、教科書等を参照しながら解いてください。「論語」は問題文中に本文が記載されています。最後に「テストを終了して採点ページへ」を押すと正解と詳細な解説が表示されます。</p>
        <div id="test-container">
            <div class="category-header">第1ブロック：一問一答（25問）</div>
            <div id="questions-container-2"></div>
            <div class="category-header">第2ブロック：記述問題（15問）</div>
            <div id="questions-container-3"></div>
            <div class="category-header">第3ブロック：発展・応用・高難易度（15問）</div>
            <div id="questions-container-4"></div>
        </div>
        <button class="btn" onclick="showAnswers()">テストを終了して採点ページへ</button>
    </div>
</div>

<div id="answer-page" class="page">
    <div id="score-bar">正答率: <span id="score-val">0</span>% (<span id="correct-count">0</span>/55問)</div>
    <h1>解答・解説一覧</h1>
    <div class="card" id="answers-container"></div>
    <button class="btn" onclick="location.reload()">トップに戻る</button>
</div>

<script>
const questions = [
    // ＝第1ブロック：一問一答 (1-25)＝
    { id: 1, type: "一問一答", cat: 2, q: "【握手】「わたし」が中学三年の秋から三年半の期間を過ごした、ルロイ修道士が園長を務めていた児童養護施設の名前を答えなさい。", a: "光ヶ丘天使園", e: "光ヶ丘天使園は「わたし」が少年期を過ごし、ルロイ修道士によって養育された児童養護施設です。" },
    { id: 2, type: "一問一答", cat: 2, q: "【握手】ルロイ修道士の故郷（出身国）はどこですか。", a: "カナダ", e: "ルロイ修道士はカナダのケベック郊外にある農場で生まれ育ちました。" },
    { id: 3, type: "一問一答", cat: 2, q: "【握手】ルロイ修道士との久しぶりの再会を果たした、東京にある公園の名前を答えなさい。", a: "上野公園", e: "物語の現在地点において、「わたし」とルロイ修道士は上野公園内の西洋料理店で再会しています。" },
    { id: 4, type: "一問一答", cat: 2, q: "【握手】漢字書き取り：「オムレツのホウシュウとして働く」の「ホウシュウ」を漢字で書きなさい。", a: "報酬", e: "「酬」は「報いる・お返しをする」という意味を持つ漢字です。正しい字形で記入してください。" },
    { id: 5, type: "一問一答", cat: 2, q: "【握手】漢字書き取り：「借りていた本をヘンキャクする」の「ヘンキャク」を漢字で書きなさい。", a: "返却", e: "「却」は「退く・取り去る・しりぞける」という意味の漢字であり、却下の「却」と共通です。" },
    { id: 6, type: "一問一答", cat: 2, q: "【握手】漢字書き取り：「損害をバイショウする」の「バイショウ」を漢字で書きなさい。", a: "賠償", e: "貝へんの「賠」と、つぐなうという意味の「償」を正確に組み合わせる必要があります。" },
    { id: 7, type: "一問一答", cat: 2, q: "【握手】漢字書き取り：「所轄の警察署のカンカツ内」の「カンカツ」を漢字で書きなさい。", a: "管轄", e: "車へんの「轄」は「取り締まる・統轄する」という意味を含んでいます。" },
    { id: 8, type: "一問一答", cat: 2, q: "【握手】漢字書き取り：「内閣の大臣をコウテツする」の「コウテツ」を漢字で書きなさい。", a: "更迭", e: "しんにょうの「迭」は「かわる・入れ替える」という意味を持つ漢字です。" },
    { id: 9, type: "一問一答", cat: 2, q: "【握手】漢字の読み：「文化勲章を受章する」の「勲章」の読みをひらがなで書きなさい。", a: "くんしょう", e: "「勲」の音読みは「クン」です。功績や手柄を立てた者に授与される章を指します。" },
    { id: 10, type: "一問一答", cat: 2, q: "【握手】漢字の読み：「情状を酌量して減刑する」の「酌量」の読みをひらがなで書きなさい。", a: "しゃくりょう", e: "「酌」は「汲む・相手の事情や気持ちを汲み取る」という意味を持ち、音読みでシャクと読みます。" },
    { id: 11, type: "一問一答", cat: 2, q: "【握手】漢字の読み：「深山幽谷の景色を眺める」の「幽谷」の読みをひらがなで書きなさい。", a: "ゆうこく", e: "「幽」は「深い・暗い・かすか」という意味を含み、全体で「ゆうこく」と発音します。" },
    { id: 12, type: "一問一答", cat: 2, q: "【握手】漢字の読み：「他人の意見の換骨奪胎だ」の「奪胎」の読みをひらがなで書きなさい。", a: "だったい", e: "「胎」の音読みはタイですが、前の音の影響を受けて促音化（小さな「つ」に変形）します。" },
    { id: 13, type: "一問一答", cat: 2, q: "【握手】慣用句：長い年月をかけて腕前や技術が磨かれている状態を表す、「〇〇が入る」という慣用句の空欄を漢字2字で答えなさい。", a: "年季", e: "長年の修業や経験によって技術がしっかりと身についている様子を「年季が入る」と言います。" },
    { id: 14, type: "一問一答", cat: 2, q: "【握手】重要語句：「別れを告げること。お別れの挨拶」を意味する、作中にも登場する言葉をひらがなで答えなさい。", a: "いとまごい", e: "暇（いとま）を告げて去るという意味の別れの挨拶表現です。" },
    { id: 15, type: "一問一答", cat: 2, q: "【論語】『論語』の思想的な中心であり、孔子が理想とした「倫理や道徳、社会のきまり」を重んじる思想の流れを〇〇（または〇〇教）というか。〇〇に入る漢字1字を答えなさい。", a: "儒", e: "孔子を祖とする思想体系を「儒家」、その道徳的教えを「儒教」と称します。" },
    { id: 16, type: "一問一答", cat: 2, q: "【論語】次の空欄に当てはまる、日本語として読むために白文へ補う文字や記号の総称（送り仮名や返り点などを含めたルール）を漢字2字で答えなさい。<br>「白文に、送り仮名や返り点を補って日本語の語順で読むことを〇〇という。」", a: "訓読", e: "漢字のみで書かれた白文を、日本語の文法に合わせて解読する仕組みを「訓読」と呼びます。" },
    { id: 17, type: "一問一答", cat: 2, q: "【論語】次の章句の書き下し文における空欄にあてはまる平仮名3字を答えなさい。<br>白文：温故而知新<br>書き下し文：故きを温めて〇〇〇を知れば、以て師と為るべし。", a: "新しき", e: "「新」の文字に送り仮名「しき」を付与し、歴史的仮名遣いに準じて「あたらしき」と訓読します。" },
    { id: 18, type: "一問一答", cat: 2, q: "【論語】「他人に認められなくても不満を抱かない」という立派な姿勢を表している章句の言葉は、「人知らずして〇〇〇ず」である。〇〇〇に入る平仮名3字（歴史的仮名遣い）を答えなさい。", a: "慍み", e: "「慍」は「心の中に不満をためて怒る、うらむ」という意味を成し、送り仮名を含めて「うらみず」と読みます。" },
    { id: 19, type: "一問一答", cat: 2, q: "【握手】ルロイ修道士が、「わかった」「よし」「最高だ」と言う代わりにびんと立てる、彼特有の癖がある「指」はどこですか。", a: "右の親指", e: "相手の言葉に対する強い肯定や賞賛の意を示す、ルロイ修道士独特の肯定サインです。" },
    { id: 20, type: "一問一答", cat: 2, q: "【握手】ルロイ修道士が亡くなった場所（日本の都市名）はどこですか。", a: "仙台", e: "各地の卒園生を訪ね終えたルロイ修道士は、最終的に仙台にある修道院で生涯を閉じました。" },
    { id: 21, type: "一問一答", cat: 2, q: "【握手】漢字書き取り：「洗濯物を干す」「洗う。すすぐ。」という意味を持つ、新出漢字の「タク」を漢字1字で書きなさい。", a: "濯", e: "さんずいに「曜」の右側部分（隹の上にヨが2つ並ぶ形）を組み合わせることで成立します。" },
    { id: 22, type: "一問一答", cat: 2, q: "【握手】漢字書き取り：「山野を開墾する」「荒れ地を切り開く」という意味を持つ、新出漢字の「コン」を漢字1字で書きなさい。", a: "墾", e: "下部に「土」を置き、上部に開墾の作業を表す複雑な構成のパーツを組み合わせます。" },
    { id: 23, type: "一問一答", cat: 2, q: "【握手】重要語句：「他の人のことを気にして遠慮する」や「幅をきかせる」という意味を持ち、「人目を〇〇〇〇」などの形で使う言葉を、平仮名4字で答えなさい。", a: "はばかる", e: "周囲への気兼ねを表す「人目をはばかる」や、勢力を張ることを表す「世にはばかる」といった用法があります。" },
    { id: 24, type: "一問一答", cat: 2, q: "【握手】重要語句：「金品を惜しげもなく人に与える性質のこと」を、「〇〇がいい」というか。〇〇に入る漢字2字の語句を答えなさい。", a: "気前", e: "出し惜しみをせず、さっぱりとした態度で人に施しを行う性質を「気前がいい」と評価します。" },
    { id: 25, type: "一問一答", cat: 2, q: "【論語】次の章句の書き下し文における空欄にあてはまる平仮名3字を答えなさい。<br>白文：学而時習之<br>書き下し文：学びて〇〇に之を習ふ、亦説ばしからずや。", a: "とき", e: "「時」を「その都度・適切な時期に」という意味の副詞として捉え、「ときに」と訓読します。" },

    // ＝第2ブロック：記述問題 (26-40)＝
    { id: 26, type: "記述", cat: 3, q: "【握手】作中で、ルロイ修道士が「右の人さし指をびんと立てる」しぐさをすることがあります。これはどのような時に、何の代わりに使われる癖（サイン）ですか。その具体的な意味や役割を説明しなさい。", a: "「こら」と言って注意を引きつけたり、「よく聞きなさい」と言って教え諭したりする言葉の代わりに使われる役割。", e: "言葉を介さずに相手の注意を喚起し、教訓を授けたり戒めたりする際に行われる、彼特有の意思表示行動です。" },
    { id: 27, type: "記述", cat: 3, q: "【握手】ルロイ修道士の死を知った葬式の場で、「わたし」が「知らぬ間に、両手の人さし指を交差させ、せわしく打ちつけていた」とあります。この時の「わたし」の心情を説明しなさい。", a: "お世話になったルロイ修道士に十分な恩返しができなかった後悔と自分を責める気持ち、そして最後まで子供たちのために生涯を捧げた彼の死を激しく悼む気持ち。", e: "「人さし指を交差させて打ちつける」しぐさは、かつて園内で「悪い子」を諌める危険信号でした。無意識にそれを自身に向けることで、恩返しの不徹底への後悔と恩師への追悼を表現しています。" },
    { id: 28, type: "記述", cat: 3, q: "【握手】ルロイ修道士の人物像について、彼の「行動」や「園児に対する姿勢」を踏まえ、「献身的」「慈愛」という言葉を使って短くまとめなさい。", a: "自分の幸せよりも園児たちの幸せを第一に考え、自ら泥だらけになって食料を作り子供たちを養育した、献身的で慈愛に満ちた人物像。", e: "園長という立場にありながら農船作業や鶏舎の管理を率先して行い、自らを後回しにして園児に愛情を注ぎ続けた生涯に基づきます。" },
    { id: 39, type: "記述", cat: 3, q: "【論語】次の章句について、孔子が説いている「学習において重要なこと（バランス）」を説明しなさい。<br><div class='text-box'>学びて思はざれば則ち罔（くら）し、思ひて学ばざれば則ち殆（あやう）し。</div>", a: "他人から知識を学ぶことと、自分の頭で深く考えることの、どちらか一方に偏るのではなく、両方をバランスよく行うことが大切であるということ。", e: "外部からの知識吸収（学ぶ）と思考による自己の昇華（思う）の双方が不可欠であり、片方のみに偏る学習の危険性を説いています。" },
    { id: 30, type: "記述", cat: 3, q: "【論語】次の文章を読み、この生徒が「学びて思はざれば則ち罔し……」の章句から、どのような「気づき」を得たと言えるか説明しなさい。<br><div class='text-box'>生徒：「本をたくさん読んで、知識を得ることが勉強だと思っていたので、この言葉にドキリとしました」</div>", a: "ただ本を読んで知識を詰め込むだけでなく、それを自分の頭で主体的に考えることの両方が大事なのだという気づき。", e: "知識を受動的に蓄積する行為だけでは不十分であり、能動的な思考プロセスを伴うことの必要性を自覚した内容です。" },
    { id: 31, type: "記述", cat: 3, q: "【論語】次の章句にある、学ぶことの３つの段階（知る・好む・楽しむ）の優劣関係について、孔子はどのように説明しているか説明しなさい。<br><div class='text-box'>之を知る者は之を好む者に如かず。之を好む者は之を楽しむ者に如かず。</div>", a: "ある物事をただ知識として「知っている人」は、それを「好きな人」には及ばず、さらにそれを「好きな人」も、心から「楽しんでいる人」には及ばないという関係。", e: "対象に対する心理的深度を比較し、義務感や興味を超越して、その対象そのものを純粋に享受し楽しむ境地が最上であるとしています。" },
    { id: 32, type: "記述", cat: 3, q: "【握手】作中でルロイ修道士の様子を描写する際、「彼の握力は万力よりも強く」「てのひらは樫の板でも張ったように固かった」というような比喩表現が多く使われています。これらは彼のどのような人柄や性質を表現していますか。", a: "子供たちを守り育てるための力強さと、毎日畑仕事や鶏の世話に精を出していた勤勉で実直な性質。", e: "強固な機具や木材に例えることで、肉体的な頑健さのみならず、日々の実直な労働姿勢や園児を守る責任感の強さを表しています。" },
    { id: 33, type: "記述", cat: 3, q: "【論語】一・二点やレ点といった「返り点」は、漢文を日本語として訓読する際、どのような目的のために付けられますか。「語順」という言葉を使って説明しなさい。", a: "漢文と日本語では言葉の語順が異なっているため、日本語の語順に合わせて正しく読むための順序を示す目的。", e: "漢語特有の文法配置（語順）を日本の文体構造へ適合させるために、視線の移動経路を視覚的に明示する役割を持ちます。" },
    { id: 34, type: "記述", cat: 3, q: "【握手】「わたし」が西洋料理店でルロイ修道士と別れる際、これまでの感謝や尊敬、別れの寂しさなどの万感の思いを込めて、自ら求めた「最後の行動」は何ですか。", a: "ルロイ修道士に対して、自分から進んで手を差し出して握手を求めたこと。", e: "過去2回の受動的な握手（ルロイ修道士側からのアプローチ）とは異なり、今度は「わたし」の側から能動的に別れを惜しむ握手を求めた場面を指します。" },
    { id: 35, type: "記述", cat: 3, q: "【論語】「子曰はく」に続く、孔子の教えに見られる「人間としての生き方」の特徴について、短い言葉の中にどのようなものが表されていると言えますか。説明しなさい。", a: "人間の生き方についての鋭い観察や、深い思索が簡潔に表されているという特徴。", e: "長大な文章を用いず、短文化された章句の中に普遍的な人間心理の本質や道徳的省察が凝縮されている点が最大の特徴です。" },
    { id: 36, type: "記述", cat: 3, q: "【握手】ルロイ修道士の左の人さし指の爪が潰れ、「鼻くそを丸めたようなもの」がこびりついた正常ではない状態になっていた、戦時中の具体的な理由（事件）を説明しなさい。", a: "戦時中に丹沢の山の中で開墾に従事させられていた際、カトリックの戒律である日曜の休息を願い出た見せしめとして、日本の監督官に木づちで人さし指を叩き潰されたから。", e: "宗教的信念に基いて正当な要求を行ったルロイ修道士に対し、当時の戦時体制下の監督官が行った理不尽な暴力的制裁が真相です。" },
    { id: 37, type: "記述", cat: 3, q: "【握手】西洋料理店で「おいしいですね、このオムレツは」と言いながら、ルロイ修道士が「ナイフとフォークを動かしているだけで、オムレツをちっとも口へ運んでいない」様子から、「わたし」は何を察知し、どのような重大な事実に気づきましたか。説明しなさい。", a: "ルロイ修道士に食欲が全くない様子から、彼の体調が極めて悪く、この上野での再会が彼にとって「この世のいとまごい（最後の別れ）」であるという事実。", e: "食事の仕草のみを取り繕い、全く嚥下できていない恩師の深刻な衰弱ぶりから、永遠の別れの時が差し迫っていることを直感しています。" },
    { id: 38, type: "記述", cat: 3, q: "【握手】重要語句「年季が入る」という言葉を使って、誰かの技術や職人技を褒める例文を一つ作りなさい。", a: "（例）祖父の盆栽作りは年季が入っているため、どの作品も見事で見惚れてしまう。", e: "一朝一夕では到達できない、積み重ねられた時間と磨かれた卓越した実力を称賛する文脈で作成します。" },
    { id: 39, type: "記述", cat: 3, q: "【論語】次の章句の訓読における「亦（また）……ずや」という言い回しは、日本語の現代語訳においてどのような意味やニュアンスを強調するために使われますか。説明しなさい。<br><div class='text-box'>学びて時に之を習ふ、亦説ばしからずや。</div>", a: "「なんと……ではないか」という、心からの強い感動や感嘆、詠嘆のニュアンスを強調するため。", e: "肯定的な事実を疑問文の形で反転・強調させ、自らの内面から湧き出る大きな喜びを表現する修辞技法です。" },
    { id: 40, type: "記述", cat: 3, q: "【論語】次の章句において、孔子が「最も立派な人物（君子）」として挙げているのは、どのような状況にあっても不満を抱かない人のことですか。説明しなさい。<br><div class='text-box'>人知らずして慍（うら）みず、亦君子ならずや。</div>", a: "自分の学問や努力を、世の中の人や他人が認めてくれなくても、決して不満や恨みを抱かない人のこと。", e: "他者からの承認の有無にかかわらず、自己の倫理的・学問的探求を淡々と継続できる自立した人格者を指しています。" },

    // ＝第3ブロック：発展・応用・高難易度 (41-55)＝
    { id: 41, type: "発展", cat: 4, q: "【握手】作中で、ルロイ修道士と「わたし」との間で合計3回の「握手」が交わされますが、それぞれの握手の変化（1回目の万力のような強さ、2回目の穏やかさ、3回目のわたしから求める握手）は、物語の展開においてどのような効果や意味を持っていますか。詳しく説明しなさい。", a: "1回目でルロイ修道士の力強さと歓迎を印象付け、2回目の穏やかさで彼の病気や死期を予感させ、3回目で「わたし」からの深い感謝と永遠の別れの覚悟を描くことで、二人の絆の深まりを読者に追体験させる効果。", e: "肉体的な衰退（死期の接近）を触覚の変化を通して読者に伝達するとともに、精神的紐帯が相互の感謝へと昇華していく過程を象徴しています。" },
    { id: 42, type: "発展", cat: 4, q: "【論語】次の返り点がついた白文を訓読（書き下し文に）する際、どのような順番で漢字を読むことになりますか。記号（ア〜ウ）の正しい読む順序を答えなさい。<br><div class='text-box'>未<sub>二</sub>見<sub>レ</sub>利<sub>一</sub></div><br>（ア：未 ／ イ：見 ／ ウ：利　※見の直下にレ点、二と一の返り点がついている状態）", a: "ア→ウ→イ", e: "文頭の「未（ア）」は返り点がないため最初に読みます。続く「見（イ）」には下に向かう二点と、下から戻るレ点が重複しているため、まず一字下の「利（ウ）」へと進みます。この「利」の右下の一点を読んだ段階で、レ点の規則に則り直上の「見（イ）」へと視線を反転して戻します。結果として「未だ利を見ず（ア→ウ→イ）」の順番となります。" },
    { id: 43, type: "発展", cat: 4, q: "【握手】ルロイ修道士の生き方や価値観について、「自分の幸せよりも天使園の園児たちの幸せを心から望む」という姿勢を学んだ生徒が、友達との交流を通して「自分の親」の存在についてどのような新たな気づきを得ましたか。詳しく説明しなさい。", a: "ルロイ修道士にとって園児たちが自分の子供と等しい存在であったように、自分の親もまた、いつも自分を無条件に大切に育ててくれていたのだという気づき。", e: "偉大な教育者の無私奉仕の精神のあり方を学ぶことを契機として、身近で自身を養育してくれている保護者の愛情の深さを再認識する思考のプロセスです。" },
    { id: 44, type: "発展", cat: 4, q: "【論語】「故きを温めて新しきを知れば……」という一文は、現代に生きる私たちが「古典（昔の文学や歴史）」を学ぶことについて、どのような意義を教えてくれていると考えられますか。自身の考えを含めて説明しなさい。", a: "ただ古い知識を記憶するだけでなく、過去の教えや伝統を深く学び直す（温める）ことによって、現代の新しい課題を解決するためのヒントや、新しい知恵を見つけ出すことができるという意義。", e: "古典の学習とは単なる過去の情報の死蔵ではなく、現代的課題に対する示唆や普遍的知見（温故知新）を獲得するための手段であるという本質を説いています。" },
    { id: 45, type: "発展", cat: 4, q: "【握手】ルロイ修道士が「わたし」に語った「総理大臣のようなことを言ってはいけませんよ」という言葉の背景には、人間関係におけるどのような「戒め」が含まれていますか。説明しなさい。", a: "国籍や大きな集団を代表して物事を語ることは傲慢であり、人間は国家の枠組みではなく、目の前にある「一人一人の個人」として謙虚に向き合うべきだという戒め。", e: "集団の属性によるステレオタイプで他者をラベリングすることを否定し、徹頭徹尾、個人の主体性と存在を尊重して向き合うべきであるという倫理的忠告です。" },
    { id: 46, type: "発展", cat: 4, q: "【論語】次の章句にある条件分岐の構造「……れば則（すなは）ち〜」を踏まえ、学んだことが無駄にならないために、私たちが普段の学習において「外から知識を得ること」以外に欠かしてはならない行動は何ですか。説明しなさい。<br><div class='text-box'>学びて思はざれば則ち罔（くら）し。</div>", a: "得た知識をそのまま丸暗記するだけでなく、自分の頭を使って「それがどういう意味か」「どのように応用できるか」を深く考える（思索する）行動。", e: "受動的な情報のインプットのみを行い、能動的な反芻・論理的考察を行わない学習は、本質的な知恵に結びつかないという必然的結果を示しています。" },
    { id: 47, type: "発展", cat: 4, q: "【握手】語句の挿入：次の空欄にあてはまる最も適切な重要語句を、「年季が入る」「厄介になる」「べからず」「気前がいい」の中から選んで書きなさい。<br><div class='text-box'>「これより先、無断で敷地内に入る〇〇〇〇。」</div>", a: "べからず", e: "「べからず」は動詞の終止形等に接続し、強い禁止（〜してはならない）の規定を表す際に公式文書や標識で採用される古風な表現です。" },
    { id: 48, type: "発展", cat: 4, q: "【論語】『論語』が現在の日本人のものの考え方や心の中に、いまなお深く生き続けていると言えるのはなぜですか。その思想が及ぼした歴史的影響を踏まえて説明しなさい。", a: "孔子の教えが昔から個々の日本人の実践的な道徳観だけでなく、社会のきまりや政治の在り方に至るまで長い歴史の中で色濃く影響を及ぼし、今日まで受け継がれてきたから。", e: "古代中国に端を発しながらも、日本への伝来以降、数千年にわたり個人の修身規律や社会倫理、他者への気遣いの精神的基盤として定着し続けた歴史的背景を指します。" },
    { id: 49, type: "発展", cat: 4, q: "【握手】物語の最後で、ルロイ修道士の訃報（葬式）から「まもなく一年がたとうとしている」時期にいる「語り手の現在」の「わたし」は、どのような状況にありますか。時間の設定を整理して説明しなさい。", a: "上野公園でルロイ修道士と再会した時期（桜が散り葉桜になる前）からさらに時が流れ、ルロイ修道士の一周忌（亡くなってから一年）をまもなく迎えようとしている状況。", e: "上野での再会、その後の訃報を経て、現在は「一周忌直前」という時間的プラットフォームから、これらの一連の過去の出来事を回想している重層的な時間軸構造をとっています。" },
    { id: 50, type: "発展", cat: 4, q: "【論語】次の章句の書き下し文を読み、孔子が「学ぶことの最大の喜び」として挙げている最初の２つの要素（復習すること以外に、どのような素晴らしい出来事があるか）を説明しなさい。<br><div class='text-box'>学びて時に之を習ふ、亦説（よろこ）ばしからずや。朋（とも）遠方より来たる有り、亦楽しからずや。</div>", a: "学んだことをその都度復習して体得していく喜びと、同じ志を持った学友（友達）が遠くから自分を訪ねてきてくれる楽しさ。", e: "個人の知識の習熟という内省的な充実感と、志を同じくする学友（朋）との相互対話による社会的な喜びの2点を、学習活動における最上の幸福として位置づけています。" },
    { id: 51, type: "発展", cat: 4, q: "【握手】「現在」の上野での再会シーンにおいて、桜の花が「とうに散って、葉桜にはまだ間がある」という時期が設定されています。この背景描写は、物語全体のどのような雰囲気やルロイ修道士の状況を暗示していますか。詳しく説明しなさい。", a: "華やかな再会の時期（桜の満開）は既に過ぎ去り、やがて訪れる決定的な別れ（葉桜）に向かう途中の、物寂しくどこか予感に満ちた雰囲気や、ルロイ修道士の命の灯火が消えかけている状況を暗示している。", e: "全盛期を終えた自然の風景描写を導入することにより、ルロイ修道士の肉体的な死期の接近や、再会に漂う切なさ、終末的なトーンを視覚的に先取りして重ね合わせる表現効果です。" },
    { id: 52, type: "発展", cat: 4, q: "【論語】白文に返り点である「一・二点」がついている場合、どのような規則に従って読むことになりますか。返り点「レ点」の規則との違いに触れながら説明しなさい。", a: "レ点がすぐ下の一字から直上の一字へと返るのに対し、一・二点は二字以上離れた上の漢字に戻る際に使用され、必ず下部にある「一」のついた漢字を先に読んでから、上部にある「二」のついた漢字へと視線を戻して読むルール。", e: "隣接する漢字同士を反転させるレ点と、複数文字を跨いでジャンプさせる一・二点の構造的な差異を踏まえ、一から二へのリターンの順序性を正しく捉える知識が求められます。" },
    { id: 53, type: "発展", cat: 4, q: "【握手】ルロイ修道士の「戦勝国の白人であるにもかかわらず敗戦国の子供のために、泥だらけになって野菜を作り鶏を育てている」という行動から、彼の「無私の精神」がどのように実践されていたと言えますか。背景を踏まえて詳しく説明しなさい。", a: "戦時中に日本側から指を潰されるなどのひどい仕打ちを受けたにもかかわらず、その怨恨を一切挟まず、戦後の混乱期に飢えに苦しむ日本の子供たちの養育と食料確保のために身を粉にして働き続けたという点。", e: "国家間の対立やかつて自身が被った人権侵害といった個人的恩讐を完全に超越して、眼前に存在する弱者（子供たち）への普遍的愛と献身を日々の実直な労働によって具現化した姿です。" },
    { id: 54, type: "発展", cat: 4, q: "【論語】次の章句にある「思ひて学ばざれば則ち殆（あやう）し」という教えについて、現代の私たちが「基礎的な勉強を全くせず、自分の思い込みや独断だけで新しい計画を進めること」の危険性とどのように結びつきますか。詳しく説明しなさい。", a: "先人の知識や基礎となるデータを広く学ぶことを怠り、自分の頭だけで考えて独断に陥ると、客観性を欠いて間違いが多くなり、計画全体が失敗する危険性（殆し）と結びつく。", e: "先行研究や客観的事実の学習を軽視し、自己の狭い主観的思考のみに依存して独走する行為が、致命的な判断ミスや危険な過ちを誘発するという訓戒を現代的に適用したものです。" },
    { id: 55, type: "発展", cat: 4, q: "【握手】物語の結びで、ルロイ修道士の訃報を聞いた「わたし」が、知らぬ間に「両手の人さし指を交差させ、せわしく打ちつけていた」というラストシーンがあります。この行動を「わたし」が「知らぬ間に（無意識に）」行っていたという描写は、彼の受けた衝撃の大きさをどのように表現していますか。詳しく説明しなさい。", a: "ルロイ修道士の死という現実や、彼の体中が悪性腫瘍の巣になっていたという事実に対する悲しみと動揺が、頭で考えるよりも先に、体に染み付いていた恩師のしぐさ（危険信号・自分を責めるサイン）として無意識に溢れ出てしまうほどの、言葉にならない凄まじい衝撃を表現している。", e: "意識的な制御を離れた「無意識のしぐさ」という身体的描写を用いることにより、突然もたらされた訃報に対する精神的動揺、および深い傷心と後悔の念がどれほど圧倒的な規模であったかを克明に表しています。" }
];

function generateQuestions() {
    questions.forEach(q => {
        const container = document.getElementById(`questions-container-${q.cat}`);
        const div = document.createElement('div');
        div.className = 'question-item';
        let content = `<span class="q-num">問${q.id}</span> <span class="q-type">${q.type}</span><br>${q.q}`;
        
        if (q.type === "記号選択" && q.options) {
            content += `<div class="options-container">`;
            const labels = ["ア", "イ", "ウ", "エ"];
            q.options.forEach((opt, i) => {
                content += `<div class="option-item">${labels[i]}：${opt}</div>`;
            });
            content += `</div>`;
        }
        
        div.innerHTML = content;
        container.appendChild(div);
    });
}

function showAnswers() {
    clearInterval(countdown);
    document.getElementById('test-page').classList.remove('active');
    document.getElementById('answer-page').classList.add('active');
    document.getElementById('score-bar').style.display = 'block';
    
    const container = document.getElementById('answers-container');
    questions.forEach((q, idx) => {
        const div = document.createElement('div');
        div.className = 'ans-item';
        div.id = `ans-item-${idx}`;
        
        let qContent = `<div class="ans-q-text"><span class="q-num">問${q.id}</span> [${q.type}] ${q.q}`;
        if (q.type === "記号選択" && q.options) {
            qContent += `<div class="options-container">`;
            const labels = ["ア", "イ", "ウ", "エ"];
            q.options.forEach((opt, i) => {
                qContent += `<div class="option-item">${labels[i]}：${opt}</div>`;
            });
            qContent += `</div>`;
        }
        qContent += `</div>`;

        div.innerHTML = `
            ${qContent}
            <div><span class="ans-correct">模範解答・正解：${q.a}</span></div>
            <div class="ans-explanation"><strong>採点基準・解説:</strong> ${q.e}</div>
            <div class="scoring-btns">
                <button class="score-btn btn-correct" id="btn-c-${idx}" onclick="setScore(${idx}, true)">○ 正解</button>
                <button class="score-btn btn-wrong" id="btn-w-${idx}" onclick="setScore(${idx}, false)">× 不正解</button>
            </div>
        `;
        container.appendChild(div);
    });
    window.scrollTo(0, 0);
}

function setScore(idx, isCorrect) {
    userScores[idx] = isCorrect;
    document.getElementById(`btn-c-${idx}`).classList.toggle('selected', isCorrect);
    document.getElementById(`btn-w-${idx}`).classList.toggle('selected', !isCorrect);
    updateScore();
}

function updateScore() {
    const correctCount = userScores.filter(s => s === true).length;
    document.getElementById('correct-count').innerText = correctCount;
    document.getElementById('score-val').innerText = Math.round((correctCount / 55) * 100);
}

let timeLeft = 30 * 60;
const timerDisplay = document.getElementById('timer');
const userScores = new Array(55).fill(null);

const countdown = setInterval(() => {
    let minutes = Math.floor(timeLeft / 60);
    let seconds = timeLeft % 60;
    timerDisplay.innerText = `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
    if (timeLeft <= 0) {
        clearInterval(countdown);
        alert('時間終了です！採点ページへ移ります。');
        showAnswers();
    }
    timeLeft--;
}, 1000);

generateQuestions();
</script>

</body>
</html>
